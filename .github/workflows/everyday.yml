name: Scrape everyday
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"  # Daily at 04:00 UTC

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run everyday scraper
        run: python scraper/scrape_everyday.py

      - name: Render everyday.html
        run: python scraper/render_everyday.py

      - name: Upload data as artifact for inspection
        uses: actions/upload-artifact@v4
        with:
          name: everyday-data
          path: |
            data/everyday/
            docs/everyday.html
          retention-days: 7

      - name: Commit updated data and rendered page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/everyday/ docs/everyday.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(everyday): update scraped data and rendered page"
            git push
          fi
