n rad produkter i vårt huvudsortiment såväl som GANT Rugger och GANT av Michael Bastian – inklusive pikétröjor för män, chinos för män, blazers för män och jeans för män.</p>", "status": "active", "category_slug": "mode-och-accessoarer", "category_name": "Mode och accessoarer", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896312-ca95-72ce-9c21-c5107976a101", "name": "Scandinavian Outdoor", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Scandinavian_Outdoor-1689584323.jpg", "description": "<p>Vi på Scandinavian Outdoors har under de senaste 50 åren gjort vårt yttersta för att alla ska kunna njuta av friluftslivet.&nbsp;&nbsp;Scandinavian Outdoor klär dig från topp till tå - för ditt livs äventyr såväl som till vardagslivet. Här hittar du tekniska skalkläder för isklättring, samt avslappnad vandrings- och snorklingsutrustning för korta turer.</p>", "status": "active", "category_slug": "sport-och-fritid", "category_name": "Sport och fritid", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "018abc10-e2a1-7029-a2d1-0df7f582fd1c", "name": "Interflora", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/w36JymmaiRXSqUKUaTXaIfbyYoJ7VMIi2Urjui44.png", "description": "<p>Interfloras vision är att få fler att älska blommor – och varandra.&nbsp;Interfloras blomsterförmedling är Sveriges äldsta och ledande blomsterförmedling. Sedan starten 1923 har Blommogram fört människor närmare varandra genom att förmedla blommor över hela världen.</p>", "status": "active", "category_slug": "present-och-blommor", "category_name": "Present och blommor", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "018abc11-2a02-735b-8033-090f4cd76a9a", "name": "Extra Optical", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/vmiXA2j569N8E9pgQoddbhz98jUVLS0ADO7jJWIw.jpg", "description": "<p>Hos oss kan du beställa alla typer glasögon, och som andra optikerkedjor, kan vi också korrigera för närsynthet, översynthet, skeva hornhinnor samt för de som behöver prisma. Lika bra glasögon, men till ett lägre pris.&nbsp;Vi ska alltid ha Sveriges billigaste glasögon med styrka! Vi har ett stort sortiment med trendiga nyheter. Alla ska ha råd med ett par kvalitetsglasögon.</p>", "status": "active", "category_slug": "mode-och-accessoarer", "category_name": "Mode och accessoarer", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "018abc11-34de-73c4-8ed0-7a13134b0136", "name": "Träningsmaskiner.com", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/k5zuSdQouPvQBp9nxPA2OKtT0jwHqAY9nS42Vn5I.jpg", "description": "<p>Med en kombination av brett sortiment, bra priser och stor kunskap om träningsmaskiner strävar Träningsmaskiner.com&nbsp;alltid efter att vara den ledande återförsäljaren av träningsmaskiner i Sverige.&nbsp;Vi levererar träningsmaskinerna fraktfritt, snabbt och säkert till valfri adress.</p>", "status": "active", "category_slug": "sport-och-fritid", "category_name": "Sport och fritid", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_en oppa nu. Acceptera cookies där du handlar.&nbsp;<br><br></div><div>2. Slutför beställningen i samma session och besök inte andra webbplatser samtidigt. Har du redan varor i din Amazon-inköpskorg? Töm då din korg först. Endast varor som har lagts till efter att du har klickat på länken på onlineshopping.flysas.com är berättigade till att tjäna EuroBonus-poäng.&nbsp;<br><br></div><div>3. Välj de varor du vill köpa. Lägg dem i din korg och slutför utcheckningsprocessen.&nbsp;<br><br></div><div>4. Köpet registreras automatiskt och du får ett bekräftelse mail om poängintjäning när varorna har skickats.<br><br></div><div>&nbsp;<br><br></div><div><strong>Observera särskilda villkor för köp på Amazon: </strong><br><br>- Kom ihåg att du måste handla via den här sidan.</div><div><br>- Du kan inte tjäna poäng på spel, presentkort, frakt och moms.&nbsp;<br><br></div><div>- Om du handlar från flera kategorier kommer dina beställningar att visas som flera transaktioner.&nbsp;<br><br></div><div>- Du kommer inte att tjäna poäng på varor som redan finns i din varukorg.&nbsp;<br><br></div><div>- Du tjänar endast poäng för beställningar som levereras till Sverige.<br><br>- Om du har ett shopping-extension installerat kan det hända att köpet inte registreras korrekt.<br><br></div>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 75, "bonus": 25, "level": 15, "unit_variable": true, "has_campaign": true, "campaign_ends_human": "om 2 dagar", "campaign_ends_human_en": "in 2 days", "campaign_started": "2026-04-24", "campaign_ends_date": "2026-04-28", "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "018ec72b-d288-7262-acbe-3b258b4b7862", "name": "Mekonomen", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/xqpx8QThQTT3OoOlFtwzWPbHiRNOkrBy5mpjRyV8.jpg", "description": "<div>Mekonomen gör billivet enklare genom ett brett och lättillgängligt utbud av prisvärda och innovativa lösningar och produkter för r, samt serietidningar och manga.&nbsp;<br><br></div>", "status": "active", "category_slug": "bocker-film-och-musik", "category_name": "Böcker, film och musik", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0190821c-b4cc-7104-bb17-0551e0e4f28c", "name": "Widforss", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/ubtHDpDM082pRssujMGVGwFzKfeKk3Iw5BoCz3v1.jpg", "description": "<div>Välkommen till Widforss.se, Sveriges främsta destination för jakt- och outdoor-entusiaster, etablerad 2017. Till skillnad från traditionella butiker, finns Widforss endast online, vilket gör det enklare än någonsin att handla allt du behöver för ditt friluftsliv.&nbsp;</div>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 15, "bonus": 0, "level": 3, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01908228-b827-7275-8096-f16aecc1f861", "name": "Libresse", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/s9RdlIn86uGzS48N3LsoLJg1fXPlozMIGYPFXBxr.png", "description": "<div>Vi har jobbat med mens i över 40 år och från första stund har vårt fokus varit att avdramatisera mens och göra mensskydd som ger den som har mens möjligheten att leva precis som man vill. Alla våra produkter är uppskattade av de som använder dem och framförallt populära är våra menstrosor som gjort mensen smidigare.</div>", "status": "active", "category_slug": "halsa-och-skonhet", "category_name": "Hälsa och skönhet", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "cam n": "<div>Gymkompaniet.se drivs under mottot \"som det borde vara\". Med det menar vi att vi t.ex. försöker ta bort all byråkrati och krångel i bolaget. Det innebär att vi köper en majoritet av vår utrustning direkt från fabrikerna utan mellanhänder, och istället för att slå på höga marginaler så erbjuder vi riktigt bra produkter till ännu bättre priser.</div>", "status": "active", "category_slug": "sport-och-fritid", "category_name": "Sport och fritid", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0191c69c-8104-7289-82d4-3a48cf7b7468", "name": "Kalaslagret", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/3QJdyaDOUV8jUiS3TjOHeCjey3qfxNVydTuaZPfK.jpg", "description": "<div>Så från en ide att vilja erbjuda ett brett sortiment av tillbehör till barnkalaset och festen för barn, i många olika tema för friheten av val i alla tycken och smaker, har Kalaslagret utvecklats till det det är idag. Vi tycker att en fest, ett kalas eller ett barnkalas blir så roligt och ombonat när det dekoreras med ballonger, girlanger, färgglada tallrikar och massor av andra kalastillbehör. Det går liksom inte att göra det för mycket!</div>", "status": "active", "category_slug": "present-och-blommor", "category_name": "Present och blommor", "main": 50, "bonus": 0, "level": 10, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "019242b2-dd1b-7245-aa07-a6a671eb9271", "name": "MELIMELI", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/dg75bEPtXhLi966yF7MjgRbkfpoZulWcQ301T4ke.png", "description": "<div>Idén bakom MELIMELI är att hemmet ska vara en plats för frihet och möjlighet att kunna vara sig själv. Efter många år inom inredningsbranschen noterade Amelia Widell, grundare och chefsdesigner, att det fanns ett hål på marknaden och valde år 2015 att starta MELIMELI.</div>", "status": "active", "category_slug": "uncategorized", "category_name": "Uncategorized", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01928b1c-98dd-7283-b3ef-fa554e6437c8", "name": "Watski", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/rmBj4bU8qYy9VWb4EOBpj6g221Rc64PI7VPhOUQK.png", "description": "<div>På Watski, din partner inom båttillbehör sedan 1916, förstår vi vikten av pålitliga och högkvalitativa båttillbehör för en säker och njutbar navigering. Som Nordens ledande leverantör av båtutrustning och båtdelar, erbjuder vi ett omfattande urval av produkter som säkerställer din och din båts välbehag under alla förhållanden.</div>", "status": "active", "category_slug": "uncategorized", "category_name": "Uncategorized", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0192958a-3d0c-73f6-8808-283b59ffe62b", "name": "Safira", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/QDi4s9grimdaMWXKTRRyy6VXQb2pigLkb30m3gDw.png", "description": "<div>Safira är ett svenskt smyckesmärke som grundades 2012. Vi använder äkta 925 sterling silver, 14-24 karat äkta guld och mässing. De ädelmetaller som vi använder bär kontrollstämplar vilka garanterar dess äkthet. Idag består mer än 85% av vårt sortiment av smycken tillverkade av återvunna metaller.</div>", "status": "active", "category_slug": "uncategorized", "category_name": "Uncategorized", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0192ddc6-4608-72b2-8929-5403ce7b51ad", "name": "Petson djurförsäkring", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/wXuIujmoZAmPLTKn7AOU6aRPClsEwdkMj8lRV4SZ.png", "description": "<div>Petson är startat av människor som kan djurhälsa. Vi är djurägare, veterinärer och uppfödare som med vår samlade kunskap vill erbjuda ett enkelt sätt att göra rätt val för ditt djurs välmående. Petson är djurförsäkringen där kunskap lönar sig.<br><br><strong>Vänligen notera: </strong>Detta erbjudande gäller endast en gång per EuroBonus medlem och är endast tillåtet för nya kunder. Du tjänar bara poäng när du köper försäkring.</div>", "status": "active", "category_slug": "uncategorized", "category_name": "Uncategorized", "main": 2000, "bonus": 0, "level": 400, "unit_variable": false, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0192e736-1c11-70c6-aeb3-fef317d66746", "name": "Myka", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/MH1ryktJZNYOv6Qb0Q9YItAoSREjd3rNSFQ5UdhX.png", "description": "<div>MYKA smycken är designade för att vara personliga. Vi vill att du ska ta våra mönster och verkligen göra dem till dina egna. Oavsett om det är ett namnhalsband för att uttrycka dig själv eller en present till en förälder med sina barns namn ingraverade, erbjuder vi något speciellt för alla.</div>", "status": "active", "category_slug": "uncategorized", "category_name": "Uncategorized", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, lineshopping.loyaltykey.com/storage/app/public/shops/images/QnYF31hkiPkS3LBA0IuEgQBoPUaxEYeiKxMr0wMh.png", "description": "<div>Boxningsshopen.se är en del av företaget Sport Scandianvias webbshopuniversum og säljer bland annat Boxhandskar, Boxkuddar, MMA-utrustning, träningsutrustning samt boxkläder och skor. Du hittar utrustning precis från mycket billig till professionell utrustning, så det finns något för alla och för alla nivåer.</div>", "status": "active", "category_slug": "sport-och-fritid", "category_name": "Sport och fritid", "main": 50, "bonus": 0, "level": 10, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0197a72c-6e7d-7200-b949-a127880137d2", "name": "Makeup Mekka", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/YIEW1AB0VvIujipcVlhiJwSyXUkLW3qsjRjqMiyd.png", "description": "<div>Et skönhetsmärke med uppdraget att skapa roliga och lekfulla sminkprodukter till överkomliga priser. Idén föddes ur tanken ”Behöver hög kvalitet av smink vara dyrt?” och vårt uppdrag att utmana detta började. Idag är vi en av Skandinaviens största nätbutiker för smink och skönhet och vi fortsätter att växa. Vi erbjuder våra kunder ett brett utbud av trendiga produkter inom smink, hudvård, accessoarer, tillbehör och smycken.</div>", "status": "active", "category_slug": "halsa-och-skonhet", "category_name": "Hälsa och skönhet", "main": 50, "bonus": 0, "level": 10, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0197a732-7d22-7195-a1a2-80a799a291a6", "name": "Workout Brands", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Lq8ENMZ1evI0tsqozSHfjKG9DIU1Lf4P6ne81dp4.png", "description": "<div>Driven av vårt outtröttliga åtagande gentemot vårt community vill vi erbjuda ett genomtänkt urval av träningskläder från de bästa av varumärken, som alla ska kunna stötta dig till rörelse. Det oavsett om det gäller stora prestationer eller de något mindre segrarna i vardagen.</div>", "status": "active", "category_slug": "uncategorized", "category_name": "Uncategorized", "main": 50, "bonus": 0, "level": 10, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0197c0ea-b1e0-732d-9954-8f087718f4c8", "name": "Axkid", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/EseLl1Tkf04n6BPSa0qK6S0vCP6BUudyfB6Imj44.png", "description": "<div>Axkid är ett svenskt företag med en stark tro på bakåtvända bilbarnstolar för att ge barn den säkraste bilresan möjligt. Med rötter i svensk trafiksäkerhet kombinerar vi innovation, forskning och ett barns perspektiv för att utveckla produkter som skyddar liv. Vårt mål är enkelt, att varje barn ska färdas så säkert som möjligt, så länge som möjligt.</div>", "status": "active", "category_slug": "ovrigt", "category_name": "Övrigt", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0197c107-cebd-72fa-a046-e400b8d63285", "name": "Liffner", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/sX4sNHETbx0D02DheWsLgejN2O04AG0EH78Fe7HB.png", "description": "<div>Liffner är ett skandinaviskt lädervarumärke grundat i uttrycksfull minimalism, tidshävdvunnet italienskt hantverk och den tysta styrkan hos målmedveten design.&nbsp;</div>", "status": "active", "category_slug": "mode-och-accessoare ampaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0197ef5b-0676-7274-947a-b1665e2ce639", "name": "Stradivarius", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/HcEzPkMzuQm36xQDJn5YbRN83AZJI82Ja1IoAsbf.png", "description": "<div>Vi ser mode som en uttrycksform, ett sätt att ha kul och släppa taget. Vi förstår att precis som människor förändras, utvecklas och förvandlas vår stil. Det är därför vi designar våra kollektioner med olika situationer och ögonblick i livet i åtanke.&nbsp;</div>", "status": "active", "category_slug": "mode-och-accessoarer", "category_name": "Mode och accessoarer", "main": 50, "bonus": 0, "level": 10, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0197ef68-753b-700a-b3ab-5c84cd31e6fa", "name": "VetApoteket", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/ZLzzAzyIfjBzUUF0Alw7xX6mlGdLEPTwo4RuIzfw.png", "description": "<div>På vetapotek.se finns mat och tillbehör till hunden, katten, hästen och gnagaren både i form av foder, leksaker och annat.</div>", "status": "active", "category_slug": "djurtillbehor", "category_name": "Djurtillbehör", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0197ef73-de0d-7167-bfa8-4c22d786b9e4", "name": "Toyspace", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/sjlEoYRZsHt152f5hi7Ljbh5pOxNeXQ4gF3694px.png", "description": "<div>Våra ambitioner är att leverera välkända varumärken till låga y", "category_name": "Barn och baby", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0198a8e7-3e54-71cb-ad0c-c944f1631790", "name": "Bixia", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/4viRmpyPe9cUXMeVZzzA21Jl01LU9zlSmrl7pIa0.png", "description": "<div>På Bixia arbetar vi för att öka andelen förnybar och lokalproducerad el. Det gör vi genom att utveckla hållbara energitjänster och vara ett av de elbolag i Sverige som köper in störst andel förnybar och lokalt producerad el.<br><br><strong>Vänligen notera:</strong> Den här kampanjen kan bara användas en gång per Eurobonus-medlem. Kampanjen gäller endast nya svenska kunder - motsvarande icke-aktiva kunder inom de senaste 12 månaderna. Du måste ha varit kund i minst 3 månader innan poäng betalas ut, med verkan från den dag ditt avtal träder i kraft.</div>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 5000, "bonus": 0, "level": 1000, "unit_variable": false, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0198ade2-cd72-718f-8db4-a6fa5294f50b", "name": "Stutterheim", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/InleOLPWqtDChc6Aqxixmno19icaZiHqCUtPDvTg.png", "description": "<div>Med rötterna i svensk minimalism skapar vi stilrena och funktionella plagg, designade i Stockholm och tillverkade i Europa.&nbsp;Inspirerade av urban kultur och street style strävar vi efter att lyfta din stil med tidlösa silhuetter.</div>", "status": "active", "category_slug": "mode-och-accessoarer", "category_name": "Mode och accessoarer", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0198eb3d-2cb1-719e-ac4c-9b8eb484a72a", "name": "Trippel", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/iJR03HNWqHD2sk54DxsuUWMKOqzFNRJDOyEKpEwp.png", "description": "<div>Trippel är ett unikt samarbete mellan Viaplay, Storytel och Podme som ger dig tillgång till ett omfattande utbud av underhållning. Genom att kombinera dessa tre tjänster får du tillgång till filmer, serier, ljudböcker och poddar - allt i ett och samma paket. Nu har du möjligheten att testa Trippel fritt i 30 dagar.<br><br><strong>Vänligen notera: </strong>Detta erbjudande gäller endast en gång per EuroBonus medlem och är endast tillåtet för nya, svenska prenumeranter. Du tjänar bara poäng om du fortsätter din prenumeration i minst en månad efter provperioden.</div>", "status": "active", "category_slug": "uncategorized", "category_name": "Uncategorized", "main": 250, "bonus": 0, "level": 50, "unit_variable": false, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0198f505-f659-71c8-8294-ba44cb37055f", "name": "Möbeljätten", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Bx1erUWS1j9KKugJxVcOpGRnbZqNScnReX0yjdha.png", "description": "<div>På Möbeljätten hittar du ett brett sortiment av möbler och heminredning – alltid till riktigt låga priser. Utforska allt från möbler och inredning till trädgård och utemiljö.</div>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01994d77-5844-70f9-9bf9-499c47557189", "name": "Dalakraft", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/ZzTTWNOKcvdQpqVTg3NsxOvitirtxrxkABuPy7Mn.png", "description": "<div>Med vårt elavtal Dalakraft Vintertrygg säkras din elkostnad under de månader på året då priset oftast är som högst. Perfekt för dig som vill känna en extra trygghet i att undvika dyrare toppar i elpriset.<br><br><strong>Vänligen notera:</strong> Den här kampanjen kan bara användas en gång per Eurobonus-medlem. Kampanjen gäller endast svenska EuroBonus-medlemmar, som inte varit kund tidigare. Du måste ha varit kund i minst 3 månader innan poäng betalas ut, med verkan från den dag ditt avtal träder i kraft.</div>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 4000, "bonus": 0, "level": 800, "unit_variable": false, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01994d80-8d64-7163-8399-70ec17118475", "name": "Meta", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/wS2c0JfjZtJ3hBQZLpOEHTbaIduhl7D0gKTxDPuL.png", "description": "<div>Med en ikonisk design och den senaste teknologin inom wearables kan du fånga och dela din värld i form av bilder, videosamtal eller livesändningar, lyssna på din favoritspellista via de inbyggda Bluetooth-högtalarna eller ringa och skicka sms med röstkommandon – allt från dina Ray-Ban Meta-glasögon.&nbsp;</div>", "status": "active", "category_slug": "mode-och-accessoarer", "category_name": "Mode och accessoarer", "main": 15, "bonus": 0, "level": 3, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01995763-7b45-7349-86da-d9d1cbac19fd", "name": "Greenfee365", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/iduDeb4PuNDHGTVxfjmYB9S4LfWwqsSQ3KC7LoZ5.png", "description": "<div>Greenfee365.com är en bokningsplattform för golfspelare. Vår vision är att ge er den bästa och enklaste upplevelsen av att boka speltider online – oavsett när eller var du vill spela. Vi älskar golf och vill inspirera dig med storslagna golfupplevelser.</div>", "status": "active", "category_slug": "sport-och-fritid", "category_name": "Sport och fritid", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0199576c-44f0-7126-ae67-4567d42f4b2c", "name": "Journeylife", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Q88ozNksqR3tE3HjGBPJgOROAcpLVWbvBwXTLcbK.png", "description": "<div>Vårt mål är inte att ha det största sortimentet, utan att erbjuda de allra bästa produkterna i varje kategori. Vi har alltid prioriterat att sälja kvalitetsprodukter och vi fortsätter att förbättra vårt utbud baserat på värdefulla erfarenheter och feedback från våra kunder. Vårt sortiment består uteslutande av produkter under vårt eget varumärke, Journeylife.&nbsp;</div>", "status": "active", "category_slug": "transport", "category_name": "Transport", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "019957dd-6de6-7224-a879-98343db6082c", "name": "Understatement", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/43qDeM2i8b0qv7iOJExtGP13 >", "status": "active", "category_slug": "dator-och-elektronik", "category_name": "Dator och elektronik", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0199f131-870b-7117-a104-6ffd56ea0973", "name": "Prime Beds", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/brv0luhLzyhbE9VA4gZ3wIUdjMmp6urL1wrt0kLf.png", "description": "<div>Hos Prime Beds handlar allt om mer än bara sängar. Det handlar om en passion för hantverk, en djup respekt för naturens material och en övertygelse om att god sömn är grunden för ett gott liv. Vår resa började med en idé om att skapa sängar som inte bara är bekväma, utan också vackra och hållbara – sängar som berikar ditt liv natt efter natt.</div>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "019a112d-87ab-730e-9bb7-101330a28267", "name": "Bottle Hero", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/WWLDPueGC3HqiaA85x7hBL0dL6M2Nve3gKSJfopH.png", "description": "<div>BottleHero är en av Sveriges mest populära webbshoppar inom vin, sprit och öl. Med ett brett sortiment och attraktiva priser gör de det enkelt för både privatpersoner och företag att köpa kvalitetsdrycker online.</div>", "status": "active", "category_slug": "mat-och-dryck", "category_name": "Mat och dryck", "main": 50, "bonus": 25, "level": 10, "unit_variable": true, "has_campaign": true, "campaign_ends_human": "om 4 dagar", "campaign_ends_human_en": "in 4 days", "campaign_started": "2026-04-24", "campaign_ f", "name": "Robot-dammsugaren.se", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/VE3fUsiFy9LdypJSBA0sZbdfBfcbcpUJ7YhsgUqU.png", "description": "<div>Hos Robotdammsugaren.se kompromissar vi aldrig med kvalitet. Därför hittar du bara noga utvalda robotdammsugare från de bästa tillverkarna på marknaden. Vi erbjuder modeller i alla prisklasser, så att du kan få intelligent städning oavsett budget.</div>", "status": "active", "category_slug": "uncategorized", "category_name": "Uncategorized", "main": 50, "bonus": 0, "level": 10, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "019ad964-5fce-7380-ba91-5c4007d5ebbd", "name": "Singular Society", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/wcfXLMPwRJhhBQx121HnE7FsuvcIThjvxuN9hNtP.png", "description": "<div>Singular Society är ett medlemsbaserat varumärke som erbjuder kompromisslöst tillverkade premium-produkter för hemmet och garderoben, framtaget i nära samarbete med några av världens främsta tillverkare. Våra medlemmar får möjligheten att handla hela sortimentet till självkostnadspris, helt utan vinst-påslag och med full transparens.<br><br><strong>Vänligen notera: </strong>Detta erbjudande gäller endast en gång per EuroBonus medlem och är endast tillåtet för nya medlemmar, som inte är eller inte har varit medlem i Singular Society tidigare. Du tjänar poäng som betalande medlem i minst 1 år. Poäng betalas ut efter 3 månader.<br><br></div><h1>Uppsägning av medlemskap</h1><div>&nbsp;<br><strong>Månadsvis:</strong> Om du inte vill att medlemskapet ska förnyas efter 12 månader kan du säga upp det när som helst under medlemskapsperioden. Uppsägningstiden är en månad före nästa faktureringsperiod.<br> <br><strong>Inom 14 dagar:</strong> Medlemsskapet är bindande i 12 månader, d t, med verkan från den dag ditt avtal träder i kraft.</div>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 2500, "bonus": 0, "level": 500, "unit_variable": false, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "019c472e-ad8b-703a-9abe-dd62e2e9519b", "name": "Reebok", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/yxLmSZkNGbKjzSjkzp3MKLldWbP9uObQXN88hwNj.png", "description": "<div>Med rötter som sträcker sig tillbaka 130 år är Reebok ett av de mest ikoniska och igenkännbara varumärkena inom fitness – och världen. Vi grundades på atletiska skor som förändrade sportens riktning. Sedan dess har vi skapat några av de mest innovativa produkterna och etablerat enastående varumärkessamarbeten inom branschen.</div>", "status": "active", "category_slug": "mode-och-accessoarer", "category_name": "Mode och accessoarer", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "019c66ff-c8b9-72a7-98ff-ad425e4cd33b", "name": "Mister Spex", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/3bG3SMiPMjAOEIRjK5FILisw7oxAnTzdfXKAtEnQ.png", "description": "<div>Mister Spex är ett modernt och kundfokuserat varumärke som säljer glasögon, solglasögon och kontaktlinser online. Med ett brett sortiment av stilrena, trendiga och prisvärda bågar gör Mister Spex det enkelt att hitta en modell som passar både syn och personlighet.</div>", "status": "active", "category_slug": "mode-och-accessoarer", "category_name": "Mode och accessoarer", "main": 50, "bonus": 25, "level": 10, "unit_variable": true, "has_campaign": true, "campaign_end active", "category_slug": "computer-og-elektronik", "category_name": "Computer og elektronik", "main": 15, "bonus": 0, "level": 3, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630e-2ae5-7184-adab-1a84e70c6254", "name": "NordVPN", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/NordVPN-1689584020.jpg", "description": "<div>Forestil dig VPN som en sikker, krypteret tunnel, hvorigennem onlinetrafik kan strømme. Ingen kan se gennem tunnelen og få fat i din internetdata. NordVPN giver dig ro i sindet, hver gang du bruger offentlig Wi-Fi, logger på dine personlige konti og arbejdskonti på farten eller når du ønsker at bevare din browserhistorik for dig selv.<br><br><strong>Bemærk venligst:</strong> Kampagnen gælder kun for nye kunder som ikke i forevejen er, eller har været kunde hos NordVPN.</div>", "status": "active", "category_slug": "mobil-og-bredband", "category_name": "Mobil og bredbånd", "main": 100, "bonus": 0, "level": 20, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630e-3572-7186-9686-3ccd8ac6130b", "name": "Farnell", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Farnell-1689584023.jpg", "description": "<p>Farnell forhandler&nbsp;teknologiprodukter, tjenester og løsninger til elektronisk systemdesign, vedligeholdelse og reparation af høj kvalitet. Farnell har aktiviteter i 28 lande i hele Europa, der serviceres fra vores regionale distributionsknapper i England og Belgien. Vi er forpligtet til at støtte lokale sprog-, produkt- og forsendelsesbehov. Som en del af Farnels globale operationer, vores adgang til lager og stærkere forhol der som ikke er eller har vært NordVPN-kunder.</div>", "status": "active", "category_slug": "mobil-og-bredband", "category_name": "Mobil og bredbånd", "main": 100, "bonus": 0, "level": 20, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630e-3572-7186-9686-3ccd8ac6130b", "name": "Farnell", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Farnell-1689584024.jpg", "description": "<p>Farnell er en distributør av&nbsp;yteknologiprodukter, tjenester og løsninger for elektronisk systemdesign, vedlikehold og reparasjon. Farnell har virksomhet i 28 land over hele Europa, betjent fra våre regionale distribusjonssentraler i Storbritannia og Belgia. Vi er opptatt av å støtte lokale språk-, produkt- og forsendelsesbehov. Som en del av Farnels globale virksomhet, vår tilgang til aksjer og sterkere forhold til leverandører, er vi bedre i stand til å imøtekomme dine behov.</p>", "status": "active", "category_slug": "datamaskin-og-elektronikk", "category_name": "Datamaskin og elektronikk", "main": 15, "bonus": 0, "level": 3, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630e-3cfe-7166-9125-0e412743ab2c", "name": "Viator", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/LLmjyr2dtOJ0t8Kg6nxhAFpkArbRzDCLE5vChA8G.jpg", "description": "<p>Viator gjør det enkelt for reisende å finne akkurat det de har lyst til å gjøre. Med direkte tilgang til mer enn 200 000 bestillingsklare aktiviteter blir det enkelt å finne og bestille fantastiske opplevelser. Viator er optimalisert for bestilling på mobil, slik at reisende kan planlegge på forhånd eller bestille mens de er på f campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630e-5109-73dc-8c40-0ed3b9264c9c", "name": "Ray-Ban", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Ray-Ban-1689584031.jpg", "description": "<p>Ray-Ban solbriller er ikoner som representerer over 70 års autentisitet og stil. Fra Aviator til Wayfarer ble Ray-Ban solbriller båret av kulturledere, fra Hollywood til musikkverdenen. Med Ray-Ban Remix kan du lage dine egne tilpassede solbriller, velge fargene på rammen og linsene og en tekst som skal graveres på templet. Du kan også velge å gravere en sak eller lignende. Prøv de tilgjengelige kombinasjonene og lag din egen tilpassede Ray-Ban, eller personaliser Ray-Ban din basert på de vi opprettet for deg. Du kan velge mellom følgende modeller: Erika, Justin, Aviator, New Wayfarer og Wayfarer.</p>", "status": "active", "category_slug": "mote-og-tilbehor", "category_name": "Mote og tilbehør", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630e-5852-7113-bcf5-bdcefe1241d1", "name": "Mangotango", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Mangotango-1689584031.jpg", "description": "<p>MangoTango.no er en norsk nettbutikk med et trendy utvalg av alt en kvinne kan drømme om. Hos MangoTango.no kommer du inn i et univers med alt fra smykker, klær og hårpynt til neglelakk, såper og duftlys. Vi i MangoTango.no ønsker å tilby det siste innen trender og vi er hele tiden på jakt etter nye og spennende produkter å tilby våre kunder.&nbsp;</p>", "status": "active", "category_slug": "mote-og-tilbehor", "category_name": "Mote og tilbehør", "main": 50, "bonus": 0, "level" evel": 10, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "018abc11-7a28-71e0-bc8a-9e9617c71d80", "name": "Strim", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Strim-1695372376.jpg", "description": "<div>Vi vet at mange har kjent på hvordan det er å gå seg vill i strømmejungelen. Derfor utfordrer vi dagens kompliserte underholdningshverdag og bygger Norges enkleste og mest inspirerende strømmetjeneste. Med Strim samler du abonnementene dine i én tjeneste. Det betyr i praksis at du kan se TV, film og serier fra landets mest populære kanaler og strømmetjenester på ett sted.<br><br><strong>Vennligst merk</strong>: Denne kampanjen kan kun brukes én gang pr. kunde og gjelder kun for nye Norske kunder (ikke medlem de siste 12 månedene).</div>", "status": "active", "category_slug": "transport", "category_name": "Transport", "main": 500, "bonus": 0, "level": 100, "unit_variable": false, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "018abc11-afc8-73c7-8884-1138ad087849", "name": "VITA", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/VITA-1695372390.jpg", "description": "<p>VITA er Norges største kjede innen skjønnhet og velvære og har i dag 116 butikker fordelt over hele Norge, samt nettbutikken vita.no.&nbsp;</p>\n\n<p><br></p>\n\n\n\n<p>Den første VITA butikken ble åpnet i Oslo i 1981 og vi har lang historie på det norske markedet. Vår misjon er å være en destinasjon for alle som søker råd, inspirasjon og produkter av høy kvalitet innen skjønnhet, helse og velvære. VITAS fokus er å yte fantastisk service, tilby høy faglig kompetanse og kjente merkevarer til lave priser!</p>", "status": "active", "category_slug": "helse-og-skjonhet", "category_name": "Helse og skjønhet", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "018abc11-d5a3-703e-9a0c-6abafb58d5f7", "name": "Interoptik", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Interoptik-1695372400.jpg", "description": "<p>Vi skal alltid gi deg den beste rådgivning og oppfølging på øyehelse, syn og valg av riktige briller og kontaktlinser. Derfor har vi et fantastisk kundeservice-team som er klare for å hjelpe deg med alt du måtte trenge hjelp til.</p>", "status": "active", "category_slug": "helse-og-skjonhet", "category_name": "Helse og skjønhet", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "018ce8ef-9005-73b2-9eab-aa62d65c537a", "name": "G-Star", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/JoU6pDe3yfRbDuqJjNHW7OFOtcAhOMpvhA343BtF.jpg", "description": "<div>Denim. Det er lidenskapen vår. Det er i blodet vårt. Men vi er ikke bare et annet denimmerke. Vi er RÅ. Siden 1989 har vi flyttet grensene for denimdesign, og manifestert vår egen fremtid for denim.</div>", "status": "active", "category_slug": "mote-og-tilbehor", "category_name": "Mote og tilbehør", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "018d5538-6322-73d4-bba1-fead8cf1eb29", "name": "Helly Hansen", "logo": "https://storage.onlines   }
  var stored = null;
  try { stored = localStorage.getItem('sas-theme'); } catch (e) {}
  if (stored === 'dark' || stored === 'light') root.setAttribute('data-theme', stored);
  toggle.addEventListener('click', function() {
    var next = isDark() ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try { localStorage.setItem('sas-theme', next); } catch (e) {}
    setToggleLabel();
  });

  function t(key) { return (STRINGS[lang] || STRINGS.en)[key] || key; }

  function setToggleLabel() {
    toggle.textContent = isDark() ? t('light_mode') : t('dark_mode');
  }

  function initialsFromName(name) {
    var parts = (name || '?').split(/\s+/).filter(Boolean);
    if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
    return (name || '?').substring(0, 2).toUpperCase();
  }

  function logoHTML(shop, sizeClass) {
    var wrapperClass = sizeClass === 'logo-lg' ? 'sas-logo-wrap-lg' : 'sas-logo-wrap-md';
    if (shop.logo) {
      return '<div class="' + wrapperClass + '"><img src="' + shop.logo + '" alt="" class="sas-logo-img" loading="lazy"></div>';
    }
    return '<div class="' + wrapperClass + '"><div class="sas-logo-fallback">' + initialsFromName(shop.name) + '</div></div>';
  }

  function unit(shop) {
    return shop.unit_variable ? t('unit_per_hundred') : t('unit_per_purchase');
  }

  function endsText(shop) {
    if (lang === 'en' && shop.campaign_ends_human_en) return shop.campaign_ends_human_en;
    return shop.campaign_ends_human || '';
  }

  function isUrgent(text) {
    if (!text) return false;
    var l = text.toLowerCase();
    return l.indexOf('1 dag') !== -1 || l.indexOf('1 day') !== -1 ||
           l.indexOf('1 dage') !== -1 ||
           l.indexOf('idag') !== -1 || l.indexOf('today') !== -1 ||
           l.indexOf('timmar') !== -1 || l.indexOf('hours') !== -1 ||
           l.indexOf('timer') !== -1;
  }

  function shopUrl(uuid) {
    return 'https://onlineshopping.flysas.com/sv-SE/butiker/about-you/' + encodeURIComponent(uuid);
  }

  var backdrop = document.getElementById('modal-backdrop');
  var modal = document.getElementById('modal');
  var modalBody = document.getElementById('modal-body');
  var modalShopBtn = document.getElementById('modal-shop-btn');
  var modalClose = document.getElementById('modal-close');

  function openModal(shop) {
    var ends = '';
    if (shop.has_campaign && shop.campaign_started) {
      var endPart = shop.campaign_ends_date ? ' → ' + shop.campaign_ends_date : '';
      ends = '<div class="sas-modal-stat-row"><span>' + t('modal_campaign_period') + '</span><strong>' + shop.campaign_started + endPart + '</strong></div>';
    }
    var et = endsText(shop);
    var endsHuman = (shop.has_campaign && et) ? '<div class="sas-modal-stat-row"><span>' + t('modal_campaign_ends') + '</span><strong>' + et + '</strong></div>' : '';
    var bonusRow = shop.bonus > 0 ? '<div class="sas-modal-stat-row"><span>Bonus</span><strong>+' + shop.bonus + ' EB</strong></div>' : '';

    modalBody.innerHTML =
      '<div class="sas-modal-head">' +
      '  ' + logoHTML(shop, 'logo-lg') +
      '  <div>' +
      '    <div class="sas-modal-category">' + (shop.category_name || '') + '</div>' +
      '    <h2 class="sas-modal-title">' + shop.name + '</h2>' +
      '  </div>' +
      '</div>' +
      '<div class="sas-modal-stats">' +
      '  <div class="sas-modal-stat-row"><span>EB ' + unit(shop).replace('/', '').trim() + '</span><strong>' + shop.main + ' EB</strong></div>' +
      bonusRow +
      '  <div class="sas-modal-stat-row"><span>' + t('level_label') + '</span><strong>' + shop.level + ' ' + t('points_short') + '</strong></div>' +
      ends +
      endsHuman +
      '</div>' +
      '<div class="sas-modal-description">' + (shop.description || '') + '</div>';

    modalShopBtn.href = shopUrl(shop.uuid);
    modalShopBtn.textContent = t('modal_shop_at') + ' ' + shop.name;
    modalClose.textContent = t('modal_close');
    backdrop.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    backdrop.classList.remove('open');
    document.body.style.overflow = '';
  }

  backdrop.addEventListener('click', function(e) {
    if (e.target === backdrop) closeModal();
  });
  modalClose.addEventListener('click', closeModal);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  var shopsByUuid = {};

  function cardHTML(shop, ds) {
    var today = new Date(ds.updated.split(' ')[0]);
    var started = shop.campaign_started ? new Date(shop.campaign_started) : null;
    var daysAgo = started ? Math.floor((today - started) / 86400000) : null;
    var discoveredRecently = daysAgo !== null && daysAgo <= 2;
    var campaignClass = shop.has_campaign ? ' campaign' : '';
    var newDot = discoveredRecently ? '<div class="sas-new-dot" title="' + t('new_campaign_title') + '"></div>' : '';
    var bonusPill = shop.bonus > 0 ? '<span class="sas-pill">+' + shop.bonus + '</span>' : '';
    var et = endsText(shop);
    var daysHTML = '';
    var urgent = false;
    if (shop.has_campaign && et) {
      urgent = isUrgent(et);
      daysHTML = '<span class="sas-days ' + (urgent ? 'urgent' : '') + '">' + et + '</span>';
    }

    var div = document.createElement('div');
    div.className = 'sas-card' + campaignClass;
    div.dataset.uuid = shop.uuid;
    div.dataset.name = (shop.name || '').toLowerCase();
    div.dataset.cat = shop.category_slug || '';
    div.dataset.campaign = shop.has_campaign ? '1' : '0';
    div.dataset.urgent = urgent ? '1' : '0';
    div.innerHTML =
      '<button class="sas-card-external" title="' + t('modal_open_external') + '" aria-label="' + t('modal_open_external') + '" data-external-uuid="' + shop.uuid + '">' +
      '  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3H3v10h10v-3"/><path d="M10 3h3v3"/><path d="M8 8l5-5"/></svg>' +
      '</button>' +
      newDot +
      '<div class="sas-card-top">' +
      '  <div class="sas-card-identity">' + logoHTML(shop, 'logo-lg') + '<div class="sas-card-name">' + shop.name + '</div></div>' +
      '</div>' +
      '<div class="sas-points-block">' +
      '  <div class="sas-points-row">' +
      '    <span class="sas-points-main">' + shop.main + '</span>' +
      '    <span class="sas-eb-tag">EB</span>' +
      '    ' + bonusPill +
      '    <span class="sas-points-unit">' + unit(shop) + '</span>' +
      '  </div>' +
      '  <div class="sas-status-row">' +
      '    <span class="sas-status-label">' + t('level_label') + '</span>' +
      '    <span class="sas-status-val">' + shop.level + ' ' + t('points_short') + '</span>' +
      '  </div>' +
      '</div>' +
      '<div class="sas-card-foot">' + daysHTML + '</div>';
    return div;
  }

  function listRowHTML(shop, barPct) {
    var div = document.createElement('div');
    div.className = 'sas-list-row';
    div.dataset.uuid = shop.uuid;
    div.dataset.name = (shop.name || '').toLowerCase();
    div.dataset.cat = shop.category_slug || '';
    div.dataset.letter = (shop.name || '#').charAt(0).toUpperCase();
    div.dataset.points = shop.main;
    div.dataset.level = shop.level;
    div.dataset.firstSeen = shop.first_seen || '';
    div.innerHTML =
      '<div class="sas-list-logo-wrap">' + logoHTML(shop, 'logo-md') + '</div>' +
      '<div class="sas-list-name">' + shop.name + '</div>' +
      '<div class="sas-list-bar"><div class="sas-list-bar-fill" style="width: ' + barPct + '%;"></div></div>' +
      '<div class="sas-list-points">' + shop.main + ' EB ' + unit(shop) + '</div>' +
      '<div class="sas-list-level">' + shop.level + ' ' + t('level_short') + '</div>';
    return div;
  }

  function goneRowHTML(shop) {
    var d = document.createElement('div');
    d.className = 'sas-list-row sas-list-row-gone';
    d.innerHTML =
      '<div class="sas-list-logo-wrap">' + logoHTML(shop, 'logo-md') + '</div>' +
      '<div class="sas-list-name">' + shop.name + '</div>' +
      '<div class="sas-list-bar"></div>' +
      '<div class="sas-list-points">' + t('gone_since') + ' ' + (shop.gone_since || '') + '</div>' +
      '<div class="sas-list-level"></div>';
    return d;
  }

  function render() {
    var ds = DATA[country];
    if (!ds) ds = Object.values(DATA)[0];

    document.documentElement.lang = lang;
    document.getElementById('title-text').textContent = t('title');
    setToggleLabel();

    shopsByUuid = {};
    ds.shops.forEach(function(s) { shopsByUuid[s.uuid] = s; });

    var active = ds.shops.filter(function(s) { return s.status === 'active'; });
    var gone = ds.shops.filter(function(s) { return s.status === 'gone'; });
    var campaigns = active.filter(function(s) { return s.has_campaign; });
    var nonCampaign = active.filter(function(s) { return !s.has_campaign; });

    campaigns.sort(function(a, b) {
      if (a.unit_variable !== b.unit_variable) return a.unit_variable ? 1 : -1;
      if (b.main !== a.main) return b.main - a.main;
      return (a.name || '').localeCompare(b.name || '', lang);
    });
    nonCampaign.sort(function(a, b) { return (a.name || '').localeCompare(b.name || '', lang); });
    gone.sort(function(a, b) { return (b.gone_since || '').localeCompare(a.gone_since || ''); });

    var maxFixed = Math.max.apply(null, nonCampaign.filter(function(s) { return !s.unit_variable; }).map(function(s) { return s.main; }).concat([1]));
    var maxVariable = Math.max.apply(null, nonCampaign.filter(function(s) { return s.unit_variable; }).map(function(s) { return s.main; }).concat([1]));

    var newThisWeek = campaigns.filter(function(s) {
      if (!s.campaign_started) return false;
      var days = Math.floor((new Date(ds.updated.split(' ')[0]) - new Date(s.campaign_started)) / 86400000);
      return days >= 0 && days <= 7;
    }).length;
    document.getElementById('meta-text').textContent = t('meta_template')
      .replace('{campaigns}', campaigns.length)
      .replace('{new}', newThisWeek)
      .replace('{shops}', active.length)
      .replace('{ts}', ds.updated);
    document.getElementById('campaigns-label').textContent = t('active_campaigns_label');
    document.getElementById('all-shops-label').textContent = t('all_shops_label');
    document.getElementById('gone-label').textContent = t('gone_label');
    document.getElementById('sort-label').textContent = t('sort_label');
    document.getElementById('search-box').placeholder = t('search_placeholder');
    document.getElementById('footer-unaffiliated').textContent = t('footer_unaffiliated');
    document.getElementById('footer-about').textContent = t('footer_about');
    document.getElementById('footer-privacy').textContent = t('footer_privacy');

    var sortSel = document.getElementById('sort-select');
    sortSel.innerHTML = '';
    [
      ['az', t('sort_az')], ['za', t('sort_za')],
      ['points-desc', t('sort_points')], ['level-desc', t('sort_level')],
      ['recent', t('sort_recent')],
    ].forEach(function(pair) {
      var o = document.createElement('option');
      o.value = pair[0]; o.textContent = pair[1];
      sortSel.appendChild(o);
    });
    sortSel.value = state.sort;

    var viewFilters = document.getElementById('view-filters');
    viewFilters.innerHTML = '';
    [
      ['all', t('filter_all')], ['campaigns', t('filter_campaigns')],
      ['ending', t('filter_ending')], ['gone', t('filter_gone') + ' (' + gone.length + ')'],
    ].forEach(function(pair) {
      var b = document.createElement('button');
      b.className = 'sas-chip' + (state.view === pair[0] ? ' active' : '');
      b.dataset.view = pair[0];
      b.textContent = pair[1];
      b.addEventListener('click', function() {
        state.view = pair[0];
        applyFilters();
      });
      viewFilters.appendChild(b);
    });

    var catSel = document.getElementById('category-select');
    catSel.innerHTML = '<option value="all">' + t('category_all') + '</option>';
    ds.categories.forEach(function(c) {
      var o = document.createElement('option');
      o.value = c.slug; o.textContent = c.name;
      catSel.appendChild(o);
    });
    catSel.value = state.category;
    catSel.onchange = function() { state.category = catSel.value; applyFilters(); };

    var grid = document.getElementById('campaign-grid');
    grid.innerHTML = '';
    if (campaigns.length === 0) {
      grid.innerHTML = '<div class="sas-empty">' + t('no_campaigns') + '</div>';
    } else {
      campaigns.forEach(function(s) { grid.appendChild(cardHTML(s, ds)); });
    }

    var listEl = document.getElementById('shop-list');
    listEl.innerHTML = '';
    nonCampaign.forEach(function(s) {
      var m = s.unit_variable ? maxVariable : maxFixed;
      var pct = m ? Math.round(Math.min(100, (s.main / m) * 100)) : 0;
      listEl.appendChild(listRowHTML(s, pct));
    });

    var goneEl = document.getElementById('gone-list');
    goneEl.innerHTML = '';
    if (gone.length === 0) {
      goneEl.innerHTML = '<div class="sas-empty">' + t('no_gone') + '</div>';
    } else {
      gone.forEach(function(s) { goneEl.appendChild(goneRowHTML(s)); });
    }

    var lettersSet = {};
    nonCampaign.forEach(function(s) {
      var ltr = (s.name || '#').charAt(0).toUpperCase();
      if (/[A-ZÅÄÖ]/.test(ltr)) lettersSet[ltr] = true;
    });
    var letters = Object.keys(lettersSet).sort();
    var jumper = document.getElementById('jumper');
    jumper.innerHTML = '';
    letters.forEach(function(ltr) {
      var s = document.createElement('span');
      s.className = 'sas-jumper-letter';
      s.dataset.letter = ltr;
      s.textContent = ltr;
      s.addEventListener('click', function() {
        document.querySelectorAll('#jumper .sas-jumper-letter').forEach(function(x) { x.classList.remove('active'); });
        s.classList.add('active');
        var rows = document.querySelectorAll('#shop-list .sas-list-row');
        for (var i = 0; i < rows.length; i++) {
          if (rows[i].style.display === 'none') continue;
          if ((rows[i].dataset.name || '').charAt(0).toUpperCase() === ltr) {
            rows[i].scrollIntoView({ behavior: 'smooth', block: 'start' });
            break;
          }
        }
      });
      jumper.appendChild(s);
    });

    applyFilters();
    sortRows();
  }

  document.addEventListener('click', function(e) {
    var ext = e.target.closest('[data-external-uuid]');
    if (ext) {
      e.stopPropagation();
      var sh = shopsByUuid[ext.dataset.externalUuid];
      if (sh) window.open(shopUrl(sh.uuid), '_blank', 'noopener');
      return;
    }
    var card = e.target.closest('.sas-card[data-uuid], .sas-list-row[data-uuid]');
    if (card) {
      var sh2 = shopsByUuid[card.dataset.uuid];
      if (sh2 && sh2.status !== 'gone') openModal(sh2);
    }
  });

  function applyFilters() {
    var campaignsSection = document.querySelector('[data-section="campaigns"]');
    var allShopsSection = document.querySelector('[data-section="all-shops"]');
    var goneSection = document.querySelector('[data-section="gone"]');
    campaignsSection.classList.remove('sas-hidden');
    allShopsSection.classList.remove('sas-hidden');
    goneSection.classList.add('sas-hidden');

    document.querySelectorAll('#view-filters .sas-chip').forEach(function(c) {
      c.classList.toggle('active', c.dataset.view === state.view);
    });

    if (state.view === 'gone') {
      campaignsSection.classList.add('sas-hidden');
      allShopsSection.classList.add('sas-hidden');
      goneSection.classList.remove('sas-hidden');
      return;
    }
    if (state.view === 'campaigns' || state.view === 'ending') {
      allShopsSection.classList.add('sas-hidden');
    }

    var matchQ = function(el) {
      if (!state.query) return true;
      return (el.dataset.name || '').indexOf(state.query) !== -1;
    };
    var matchC = function(el) {
      if (state.category === 'all') return true;
      return el.dataset.cat === state.category;
    };
    document.querySelectorAll('#campaign-grid .sas-card').forEach(function(c) {
      var show = matchQ(c) && matchC(c);
      if (state.view === 'ending') show = show && c.dataset.urgent === '1';
      c.style.display = show ? '' : 'none';
    });
    document.querySelectorAll('#shop-list .sas-list-row').forEach(function(r) {
      r.style.display = matchQ(r) && matchC(r) ? '' : 'none';
    });
  }

  function sortRows() {
    var listEl = document.getElementById('shop-list');
    var rows = Array.prototype.slice.call(listEl.querySelectorAll('.sas-list-row'));
    if (state.sort === 'az') rows.sort(function(a, b) { return a.dataset.name.localeCompare(b.dataset.name, lang); });
    else if (state.sort === 'za') rows.sort(function(a, b) { return b.dataset.name.localeCompare(a.dataset.name, lang); });
    else if (state.sort === 'points-desc') rows.sort(function(a, b) { return Number(b.dataset.points) - Number(a.dataset.points); });
    else if (state.sort === 'level-desc') rows.sort(function(a, b) { return Number(b.dataset.level) - Number(a.dataset.level); });
    else if (state.sort === 'recent') rows.sort(function(a, b) { return (b.dataset.firstSeen || '').localeCompare(a.dataset.firstSeen || ''); });
    rows.forEach(function(r) { listEl.appendChild(r); });
  }

  var countrySel = document.getElementById('country-select');
  COUNTRIES.forEach(function(c) {
    var o = document.createElement('option');
    o.value = c.code; o.textContent = c.name;
    countrySel.appendChild(o);
  });
  countrySel.value = country;

  var langSel = document.getElementById('language-select');
  function rebuildLangSelector() {
    langSel.innerHTML = '';
    countryDef.languages.forEach(function(l) {
      var o = document.createElement('option');
      o.value = l;
      o.textContent = l === 'en' ? 'English' :
                      l === 'sv' ? 'Svenska' :
                      l === 'da' ? 'Dansk' :
                      l === 'nb' ? 'Norsk' :
                      l === 'fi' ? 'Suomi' : l;
      langSel.appendChild(o);
    });
    langSel.value = lang;
  }
  rebuildLangSelector();

  function updateUrl() {
    var url = new URL(window.location);
    url.searchParams.set('c', country);
    url.searchParams.set('l', lang);
    window.history.replaceState({}, '', url);
  }

  countrySel.addEventListener('change', function() {
    country = countrySel.value;
    countryDef = COUNTRIES.find(function(c) { return c.code === country; });
    if (countryDef.languages.indexOf(lang) === -1) lang = countryDef.local_lang;
    rebuildLangSelector();
    state.category = 'all';
    state.query = '';
    document.getElementById('search-box').value = '';
    updateUrl();
    render();
  });
  langSel.addEventListener('change', function() {
    lang = langSel.value;
    updateUrl();
    render();
  });

  document.getElementById('search-box').addEventListener('input', function(e) {
    state.query = e.target.value.trim().toLowerCase();
    applyFilters();
  });
  document.getElementById('sort-select').addEventListener('change', function(e) {
    state.sort = e.target.value;
    sortRows();
  });

  // Sticky scroll detection
  var stickyWrap = document.getElementById('sticky-wrap');
  var ticking = false;
  function updateSticky() {
    if (!ticking) {
      window.requestAnimationFrame(function() {
        stickyWrap.classList.toggle('is-stuck', window.scrollY > 20);
        ticking = false;
      });
      ticking = true;
    }
  }
  window.addEventListener('scroll', updateSticky, { passive: true });

  updateUrl();
  render();
})();
</script>
