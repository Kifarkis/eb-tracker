<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>EuroBonus Shopping</title>
<style>
:root {
  --bg: #faf9f7; --surface: #ffffff;
  --border: rgba(0, 0, 0, 0.08); --border-strong: rgba(0, 0, 0, 0.16);
  --text: #1a1a1a; --text-muted: #6b6b6b; --text-faint: #9a9a9a;
  --accent: #1f6feb; --accent-bg: rgba(31, 111, 235, 0.08);
  --warn: #b85c00;
  --shadow-sticky: 0 4px 12px rgba(0, 0, 0, 0.06);
}
html[data-theme="dark"] {
  --bg: #0f0f10; --surface: #1a1a1c;
  --border: rgba(255, 255, 255, 0.08); --border-strong: rgba(255, 255, 255, 0.18);
  --text: #ededed; --text-muted: #a0a0a0; --text-faint: #666666;
  --accent: #6ea8ff; --accent-bg: rgba(110, 168, 255, 0.14);
  --warn: #f0a66c;
  --shadow-sticky: 0 4px 16px rgba(0, 0, 0, 0.4);
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  margin: 0; padding: 0 0 64px;
  font-size: 14px; line-height: 1.5;
}
.sas-container { max-width: 1500px; margin: 0 auto; padding: 0 24px; }

/* Sticky controls cluster */
.sas-sticky-wrap { background: var(--bg); transition: box-shadow 0.2s ease, border-color 0.2s ease; padding-top: 32px; }
.sas-sticky-wrap.is-stuck { box-shadow: var(--shadow-sticky); border-bottom: 0.5px solid var(--border); padding-top: 16px; padding-bottom: 8px; }
@media (min-width: 641px) {
  .sas-sticky-wrap { position: sticky; top: 0; z-index: 50; }
}

.sas-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; gap: 24px; flex-wrap: wrap; }
.sas-sticky-wrap.is-stuck .sas-header { margin-bottom: 12px; }
.sas-sticky-wrap.is-stuck .sas-meta { display: none; }
.sas-title { font-size: 28px; font-weight: 500; letter-spacing: -0.02em; margin: 0 0 4px 0; transition: font-size 0.2s ease; }
.sas-sticky-wrap.is-stuck .sas-title { font-size: 20px; }
.sas-meta { font-size: 14px; color: var(--text-muted); font-family: ui-monospace, "SF Mono", Menlo, monospace; }
.sas-header-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.sas-header-select { font-family: inherit; font-size: 13px; padding: 7px 12px; border: 0.5px solid var(--border-strong); border-radius: 999px; background: var(--surface); color: var(--text); cursor: pointer; }
.sas-toggle { background: none; border: 0.5px solid var(--border-strong); color: var(--text-muted); padding: 7px 14px; border-radius: 999px; font-size: 13px; cursor: pointer; font-family: inherit; }
.sas-toggle:hover { color: var(--text); }

.sas-filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.sas-chip { font-size: 14px; padding: 8px 16px; border: 0.5px solid var(--border); border-radius: 999px; background: transparent; color: var(--text-muted); cursor: pointer; font-family: inherit; white-space: nowrap; }
.sas-chip:hover { color: var(--text); }
.sas-chip.active { background: var(--surface); color: var(--text); border-color: var(--border-strong); }
.sas-category-wrap { margin-left: auto; }
.sas-category-select { font-family: inherit; font-size: 14px; padding: 8px 14px; border: 0.5px solid var(--border); border-radius: 999px; background: var(--surface); color: var(--text); cursor: pointer; }
.sas-category-select:hover { border-color: var(--border-strong); }

.sas-search { width: 100%; font-size: 16px; padding: 13px 18px; border: 0.5px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); font-family: inherit; margin-bottom: 28px; }
.sas-sticky-wrap.is-stuck .sas-search { margin-bottom: 0; padding: 10px 14px; font-size: 14px; }
.sas-search:focus { outline: none; border-color: var(--border-strong); }

.sas-section-label { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); }
.sas-section-header { display: flex; justify-content: space-between; align-items: center; margin: 32px 0 14px 0; }
.sas-section-header .sas-section-label { margin: 0; }
.sas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 14px; }
.sas-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; min-height: 140px; color: inherit; transition: border-color 0.12s, transform 0.12s; cursor: pointer; position: relative; }
.sas-card:hover { border-color: var(--border-strong); transform: translateY(-1px); }
.sas-card.campaign { border-color: var(--accent); }
.sas-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.sas-card-identity { display: flex; align-items: center; gap: 12px; min-width: 0; }
.sas-card-external { position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: var(--text-faint); background: transparent; border: none; cursor: pointer; padding: 0; }
.sas-card-external:hover { color: var(--text); background: var(--bg); }
.sas-card-external svg { width: 14px; height: 14px; }

.sas-logo-wrap-lg, .sas-logo-wrap-md { display: flex; align-items: center; justify-content: center; background: #d1d5db; flex-shrink: 0; overflow: hidden; }
.sas-logo-wrap-lg { width: 48px; height: 48px; border-radius: 10px; }
.sas-logo-wrap-md { width: 40px; height: 40px; border-radius: 8px; }
.sas-logo-img { width: 100%; height: 100%; object-fit: cover; }
.sas-logo-fallback { width: 100%; height: 100%; color: #555; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; letter-spacing: -0.02em; }
html[data-theme="dark"] .sas-logo-wrap-lg,
html[data-theme="dark"] .sas-logo-wrap-md { background: #9ca3af; }

.sas-card-name { font-size: 17px; font-weight: 500; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 36px; }
.sas-new-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; position: absolute; top: 22px; right: 48px; }
.sas-points-block { display: flex; flex-direction: column; gap: 8px; }
.sas-points-row { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
.sas-points-main { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 26px; font-weight: 500; letter-spacing: -0.02em; line-height: 1; }
.sas-eb-tag { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; font-weight: 500; color: var(--text-faint); letter-spacing: 0.04em; }
.sas-pill { display: inline-block; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; padding: 2px 8px; background: var(--accent-bg); color: var(--accent); border-radius: 999px; }
.sas-points-unit { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: var(--text-faint); }
.sas-status-row { display: flex; align-items: baseline; gap: 6px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 14px; }
.sas-status-label { color: var(--text-faint); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
.sas-status-val { color: var(--text-muted); }
.sas-card-foot { font-size: 14px; color: var(--text-muted); font-family: ui-monospace, "SF Mono", Menlo, monospace; padding-top: 10px; border-top: 0.5px solid var(--border); margin-top: auto; min-height: 32px; display: flex; align-items: center; }
.sas-days.urgent { color: var(--warn); }

.sas-list-sort { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-muted); }
.sas-list-sort select { font-family: inherit; font-size: 13px; padding: 6px 10px; border: 0.5px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); }
.sas-jumper { display: flex; gap: 2px; padding: 6px 0 14px 0; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: var(--text-faint); flex-wrap: wrap; }
.sas-jumper-letter { padding: 4px 8px; cursor: pointer; border-radius: 4px; user-select: none; }
.sas-jumper-letter:hover { color: var(--text); }
.sas-jumper-letter.active { color: var(--text); background: var(--surface); }

.sas-list { display: flex; flex-direction: column; }
.sas-list-row { display: grid; grid-template-columns: 40px 1fr 80px auto auto; gap: 16px; align-items: center; padding: 14px 4px; border-bottom: 0.5px solid var(--border); color: inherit; scroll-margin-top: 220px; cursor: pointer; }
.sas-list-row:hover .sas-list-name { color: var(--accent); }
.sas-list-row-gone { opacity: 0.55; cursor: default; }
.sas-list-logo-wrap { width: 40px; height: 40px; }
.sas-list-name { font-size: 16px; }
.sas-list-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; width: 80px; }
.sas-list-bar-fill { height: 100%; background: var(--text-muted); border-radius: 2px; opacity: 0.45; }
.sas-list-points { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 14px; font-weight: 500; color: var(--text-muted); min-width: 140px; text-align: right; }
.sas-list-level { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; color: var(--text-faint); min-width: 90px; text-align: right; }

.sas-hidden { display: none !important; }
.sas-empty { color: var(--text-faint); font-size: 14px; padding: 16px 0; }

.sas-modal-backdrop { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.45); z-index: 100; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
.sas-modal-backdrop.open { opacity: 1; pointer-events: auto; }
.sas-modal { background: var(--surface); width: 100%; max-width: 560px; border-radius: 20px 20px 0 0; max-height: 85vh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.25s ease; overflow: hidden; }
.sas-modal-backdrop.open .sas-modal { transform: translateY(0); }
.sas-modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border-strong); margin: 10px auto 0; flex-shrink: 0; }
.sas-modal-body { overflow-y: auto; padding: 20px 24px 100px; flex: 1; }
.sas-modal-head { display: flex; gap: 14px; align-items: center; margin-bottom: 18px; }
.sas-modal-head .sas-logo-wrap-lg { width: 56px; height: 56px; border-radius: 12px; }
.sas-modal-title { font-size: 22px; font-weight: 500; letter-spacing: -0.01em; margin: 0 0 4px 0; }
.sas-modal-category { font-size: 12px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; }
.sas-modal-stats { display: flex; flex-direction: column; gap: 10px; padding: 14px 16px; background: var(--bg); border-radius: 10px; margin-bottom: 18px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; }
.sas-modal-stat-row { display: flex; justify-content: space-between; color: var(--text-muted); }
.sas-modal-stat-row strong { color: var(--text); font-weight: 500; }
.sas-modal-description { font-size: 14px; line-height: 1.6; color: var(--text-muted); }
.sas-modal-description p { margin: 0 0 12px 0; }
.sas-modal-description strong { color: var(--text); font-weight: 500; }
.sas-modal-description a { color: var(--accent); }
.sas-modal-description h1, .sas-modal-description h2, .sas-modal-description h3 { font-size: 15px; font-weight: 500; color: var(--text); margin: 16px 0 8px 0; }
.sas-modal-description ul, .sas-modal-description ol { margin: 8px 0 12px 20px; padding: 0; }
.sas-modal-description li { margin-bottom: 4px; }
.sas-modal-footer { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 20px calc(14px + env(safe-area-inset-bottom, 0px)); background: var(--surface); border-top: 0.5px solid var(--border); display: flex; gap: 10px; }
.sas-modal-primary { flex: 1; background: var(--accent); color: #fff; padding: 14px; border: 0; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; text-decoration: none; text-align: center; font-family: inherit; }
.sas-modal-primary:hover { opacity: 0.9; }
.sas-modal-close { background: none; border: 0.5px solid var(--border-strong); color: var(--text-muted); padding: 14px 18px; border-radius: 10px; font-size: 14px; cursor: pointer; font-family: inherit; }
.sas-modal-close:hover { color: var(--text); }

.sas-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 64px; padding-top: 24px; border-top: 0.5px solid var(--border); gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--text-faint); }
.sas-footer a { color: var(--text-muted); text-decoration: none; }
.sas-footer a:hover { color: var(--text); text-decoration: underline; }
.sas-footer-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

@media (max-width: 640px) {
  body { padding: 0 0 48px; }
  .sas-container { padding: 0 14px; }
  .sas-sticky-wrap { padding-top: 20px; }
  .sas-list-row { grid-template-columns: 36px 1fr auto; gap: 12px; }
  .sas-list-level, .sas-list-bar { display: none; }
  .sas-list-logo-wrap { width: 36px; height: 36px; }
  .sas-list-points { min-width: 110px; font-size: 13px; }
  .sas-card { padding: 16px; min-height: 120px; }
  .sas-points-main { font-size: 24px; }
  .sas-category-wrap { margin-left: 0; width: 100%; }
  .sas-category-select { width: 100%; }
  .sas-footer { flex-direction: column; align-items: flex-start; gap: 8px; }
  .sas-modal { max-height: 90vh; }
}
</style>
</head>
<body>
<div class="sas-sticky-wrap" id="sticky-wrap">
  <div class="sas-container">
    <div class="sas-header">
      <div>
        <h1 class="sas-title" id="title-text">EuroBonus Shopping</h1>
        <div class="sas-meta" id="meta-text"></div>
      </div>

    </div>

    <div class="sas-filter-row">

</div>

      </div>
    </div>
    <div class="sas-jumper" id="jumper"></div>
    <div class="sas-list" id="shop-list"></div>
  </section>

  <section data-section="gone" class="sas-hidden">
    <div class="sas-section-label" id="gone-label"></div>
    <div class="sas-list" id="gone-list"></div>
  </section>

  <footer class="sas-footer">
    <div class="sas-footer-left">
      <span id="footer-unaffiliated"></span>
    </div>
    <div class="sas-footer-right">
      <a href="about.html" id="footer-about">About</a>
      ·
      <a href="privacy.html" id="footer-privacy">Privacy</a>
      ·
      <span>© 2026 David Kifarkis</span>
    </div>
  </footer>
</div>

<div class="sas-modal-backdrop" id="modal-backdrop">
  <div class="sas-modal" id="modal">
    <div class="sas-modal-handle"></div>
    <div class="sas-modal-body" id="modal-body"></div>
    <div class="sas-modal-footer">
      <a class="sas-modal-primary" id="modal-shop-btn" target="_blank" rel="noopener"></a>
      <button class="sas-modal-close" id="modal-close"></button>
    </div>
  </div>
</div>

ampaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896307-cb70-7078-96e6-9379b454803c", "name": "Outnorth", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/zQJ8ybDZ8DJpfOda4jSVw5T3NScOPqJMrdhDkQO3.jpg", "description": "<p>Outnorth är&nbsp;en ledande nätbutik med fokus på produkter inom outdoor och utomhusaktiviteter. Vi har ett väldigt brett produktutbud av kvalitetsprodukter från kända varumärken som t ex Fjällräven, Haglöfs, Lundhags, Bergans, Norröna, Hilleberg, North Face, Helly Hansen,&nbsp;Suunto och&nbsp;Garmin.</p>", "status": "active", "category_slug": "sport-och-fritid", "category_name": "Sport och fritid", "main": 50, "bonus": 25, "level": 10, "unit_variable": true, "has_campaign": true, "campaign_ends_human": "om 9 timmar", "campaign_ends_human_en": "in 9 hours", "campaign_started": "2026-04-24", "campaign_ends_date": "2026-04-26", "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896307-ce95-73ec-b705-8d5a7c4410b2", "name": "Philips", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/pGfAYzhmyAnDivw5gjtNMwBg6BB6JGnDpkKobDbX.png", "description": "Philips, som varit med om att skapa CD'n, DVD'n och nu Blu-Ray, är en erkänd innovatör som fokuserar på att tillhandahålla den bästa lösningen för att förbättra människors hälsa och välbefinnande.", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896307-db4b-7046-b660-cca58f3d53f2", "name": "Lensway", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Lensway-1689583606.jpg", "description": "<p>LensWay är Nordens största internetbutik för kon e", "category_slug": "transport", "category_name": "Transport", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630e-5109-73dc-8c40-0ed3b9264c9c", "name": "Ray-Ban", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Ray-Ban-1689584030.jpg", "description": "<p>Ray-Ban solglasögon är ikoner som representerar över 70 års äkthet och stil. Från Aviator till Wayfarer bärs Ray-Ban solglasögon av kulturledare, från Hollywood till musikvärlden. Nu med Ray-Ban Remix kan du skapa dina egna solglasögon, välja färger på ram och linser och en text som ska graveras i templet. Du kan också välja och gravera ditt fall. Prova de tillgängliga kombinationerna och skapa din egen Ray-Ban eller anpassa din Ray-Ban med utgångspunkt från de som vi har skapat åt dig. Du kan välja mellan följande modeller: Erika, Justin, Aviator, New Wayfarer och Wayfarer.</p>", "status": "active", "category_slug": "mode-och-accessoarer", "category_name": "Mode och accessoarer", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630e-5d7e-709b-a148-a7237fda75ee", "name": "Adidas", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Adidas-1689584033.jpg", "description": "<p>adidas.se erbjuder det senaste och största sortimentet av adidas-produker online. Adidas har varit synonymt med excellens i mer än 70 år så du kan handla hos dem tryggt och säkert. Adidas sortiment innefattar produkter av absolut högsta kvalitet, teknologi och innovation. Deras prisbelönta produktutveckling strävar konstant efter att hjälpa atleter att upp ampaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630e-7750-7346-b464-57807dc5e1f8", "name": "Estore.nu", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Estore.nu-1689584040.jpg", "description": "eStore är en svensk webshop som erbjuder ett brett och ständigt växande utbud av prisvärda produkter. Vår huvudfokus är att kunna erbjuda våra kunder Bra priser, Snabb leverans och Trevlig support. Vi driver hela vår verksamhet från våra lokaler i Helsingborg där vi har både lager, produkthantering och kundtjänst. I vårt utbud kan du hitta allt från prisvärd hemelektronik till leksaker och mode.", "status": "active", "category_slug": "dator-och-elektronik", "category_name": "Dator och elektronik", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630e-a559-7100-863e-7bca9f8a61ea", "name": "Notino", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Notino-1689584051.jpg", "description": "<p>På Notino tror vi att skönhet bör vara tillgänglig för alla. Eftersom skönhet kan lägga till förtroende och förändring. När människor känner sig vackra når de lättare sina mål. Och i gengäld gör de världen omkring dem vackrare.&nbsp;Under de senaste 15 åren har vi blivit den e-shop med det bredaste utbudet av parfymer och kosmetika i Europa. Idag kan du välja mellan 55 000 unika produkter från 1 150 globala och mindre lokala varumärken.</p>", "status": "active", "category_slug": "halsa-och-skonhet", "category_name": "Hälsa och skönhet", "main": 10, "bonus": 0, "level": 2, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since 8.jpg", "description": "<p>På Footshop hittar du skor för kvinnor, män och barn samt hiphop och sneakers från kända märken, mössor, ryggsäckar, plånböcker och mycket mer. Alla artiklar finns i lager och redo för omedelbar frakt!</p>", "status": "active", "category_slug": "mode-och-accessoarer", "category_name": "Mode och accessoarer", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630e-db60-7339-96d9-da34b97523c4", "name": "mResell", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/mResell-1689584065.jpg", "description": "<p>mResell är den ledande e-handeln i Europa som köper och säljer renoverade Apple-produkter. Vårt uppdrag är att bygga en mer hållbar framtid genom att förlänga Apple-produktens livscykel. Alla våra enheter har inspekterats och renoverats av auktoriserade Apple-tekniker för att säkerställa att våra produkter är som nya, men kostar mindre.<br></p>", "status": "active", "category_slug": "dator-och-elektronik", "category_name": "Dator och elektronik", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630e-de91-732d-baf8-54bd0aad79fc", "name": "Kate Spade", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Kate_Spade-1689584066.jpg", "description": "<p>Härliga färger, grafiska tryck och en lekfull men ändå sofistikerad touch är Kate Spade New Yorks kännetecken och det breda sortimentet innehåller allt från kläder och accessoarer till parfym, heminredning och gåvoartiklar. Alla produkter är designade efter devisen att mode och inredning ska passa just din stil och orage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Nupo-1689584074.jpg", "description": "<p>Nupo är den trygga lösningen för dig som vill tappa ett par kilo på ett säkert och effektivt sätt. Produkterna är indelade i tre kategorier: Diet, One Meal och Slim Boost. Du kan avnjuta produkterna var för sig eller kombinera dem. Nupo är godkänt av danska Miljö- och livsmedelsverket och klassas som fullgod måltidsersättning, vilket innebär att du kan ersätta din vanliga mat med Nupo Dietprodukter</p>", "status": "active", "category_slug": "halsa-och-skonhet", "category_name": "Hälsa och skönhet", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-1164-724e-add9-82aae07ee93f", "name": "WEEKDAY", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/WEEKDAY-1689584079.jpg", "description": "<p>Weekday är ett svenskt modemärke med starka influenser från ungdomskulturen och street-modet. Märket grundades 2002 och för närvarande butiker i 10 länder medan webshoppen levererar till 18 länder. Idén är att erbjuda en unik shoppingupplevelse och en spännande blandning av egendesignat mode till män och kvinnor samt ett litet urval externa märken.</p>", "status": "active", "category_slug": "mode-och-accessoarer", "category_name": "Mode och accessoarer", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-1697-70cf-bed2-16289ac9b68c", "name": "Lysman", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Lysman-1689584080.jpg", "description": "<p>Lysman erbjuder: Låga priser. Vi tål att sney+-1689584088.jpg", "description": "<div>Disney+ är streamingtjänsten för Disney, Pixar, Marvel, Star Wars och National Geographic. Storfilmer, tidlösa klassiker och exklusiva Disney+ Originals – det finns något för alla.</div><div><br><strong>Vänligen notera: </strong>Detta erbjudande gäller endast en gång per EuroBonus medlem och är endast tillåtet för nya, svenska prenumeranter. Du tjänar endast poäng för årsprenumeration.</div>", "status": "active", "category_slug": "bocker-film-och-musik", "category_name": "Böcker, film och musik", "main": 500, "bonus": 0, "level": 100, "unit_variable": false, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-3ad3-72cf-9292-513db790fab6", "name": "Home-Tex", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/0209nwA9dthCN1VVDxOB4dQPNoeTDmrqVel2RiEn.jpg", "description": "<p>Hos Home-tex är de specialiserade på hemtextilier. De har ett brett urval av täcken, kuddar, sängkläder och lakan - kort sagt, allt du behöver för de ljusa sommarkvällarna (sommartäcken), de kalla vinternätterna (vintertäcken) och alla nätter däremellan (året om täcken). Dessutom har de ett stort urval av sängkläder med mer än 600 olika påslakan i lager.</p>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-4008-70ef-8d6f-88f1537517ac", "name": "Hemköp", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Hemköp-1689584091.jpg", "description": "<div>Hemköp finns där andra matälskare finns. Vi hälsar dig varmt välkommen i våra drygt 200 Hemköp-butiker runtom i landet, och i Sveriges enda e-handel för matälskare på hemköp.se. Mycket godare mat, på ett enklare och trevligare sätt.</div><div><br></div><div><strong>Vänligen notera:</strong> Du tjänar endast poäng vid köp online och inte i fysiska butiker. Du kan inte tjäna poäng på medicin, snus/tobak och presentkort.</div>", "status": "active", "category_slug": "mat-och-dryck", "category_name": "Mat och dryck", "main": 15, "bonus": 0, "level": 3, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-41cb-714c-8b2f-cb2c7a900d0b", "name": "Lyko", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/ZejQHrO2RofyQKWDJsxexODn1VKijcSEwXI5Jpl6.jpg", "description": "<div>Lyko är hår- och skönhetsspecialisten som strävar efter att ha den bästa kundupplevelsen och det bredaste produktsortimentet. Vi vill fånga känslan att skönhet är lekfullt, härligt och något individuellt. Totalt erbjuder vi över 55 000 produkter från fler än 1 000 varumärken, en mix av kända och nya spännande som kompletteras av vårt prisvärda private lable sortiment.</div>", "status": "active", "category_slug": "halsa-och-skonhet", "category_name": "Hälsa och skönhet", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-44d8-7219-8aad-021e37fd7fab", "name": "Stella McCartney", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Stella_McCartney-1689584092.jpg", "description": "<p>Det världsberömda brittiska modehuset Stella McCartney är känt för sin signaturstil med skarp skräddarsy, naturligt självförtroende och sexig kvinnlighet. En livslång v ", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-53a2-70ae-9335-2e13d199108f", "name": "Australian Bodycare", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Australian_Bodycare-1689584096.jpg", "description": "<p>Australian Bodycare har varit ett ledande varumärke inom hudvårdsbranschen sedan 1992. Vår vision är densamma som när vi startade – att vara ledande inom problemlösande hudvård och erbjuda svenskarna en bättre livskvalitet.</p>", "status": "active", "category_slug": "halsa-och-skonhet", "category_name": "Hälsa och skönhet", "main": 100, "bonus": 0, "level": 20, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-5536-7329-883b-ceffb426d426", "name": "Elskling", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/L7SDWuSMzsDY0VuPv90EpQm4fqCAUNZkGB5PoC77.jpg", "description": "<div>elskling.se kan genom att erbjuda ett komplett, enkelt och objektivt verktyg underlätta krångliga jämförelser av elpriser i dagens el-djungel. Utöver jämförelsen sköter elskling.se helt kostnadsfritt kundens byte av elavtal. elskling.se ansvarar för hela bytesprocessen och ser till att bytet genomförs utan problem.<br><br><strong>Vänligen notera: </strong>Erbjudandet kan nyttjas max en gång per år och gäller vid fullföljda byten. Fusk och missbruk resulterar i att ditt EuroBonus-medlemskap blockeras. Kom ihåg att du endast får poäng för godkända köp gjorda via SAS Online Shopping. Om du returnerar eller avbryter ett köp innan 3 månader fö ategorized", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-62ca-7010-9dfe-6dfeddf77384", "name": "Helloprint", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Helloprint-1689584100.jpg", "description": "<p>För 15 år sedan började vårt team erbjuda en standard&nbsp;printing service&nbsp;online. Vi växte snabbt till att bli den __ största spelaren__ på marknaden och bevisade gång på gång att vi kunde leverera online tryckorder&nbsp;cheaper,&nbsp;easier&nbsp;och&nbsp;faster&nbsp;än konkurrensen. Det är vad vi fortfarande gör; leverera mer prisvärd, lättare och snabbare, skriva ut till dig - det är vår passion.&nbsp;Välkommen till Helloprint.</p>", "status": "active", "category_slug": "kontorsmaterial", "category_name": "Kontorsmaterial", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-6e7a-717f-bffd-c197ba7fa46f", "name": "Stjärnurmakarna", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Stjärnurmakarna-1689584103.jpg", "description": "<p>Stjärnurmakarna är en rikstäckande butikskedja som har funnits i över 100 år. Vi har ett arv att vårda. Därför bryr vi oss om dig och din klocka över tid. Det innebär att vi gärna hjälper dig under hela din klockresa. Oavsett om du är intresserad av att skaffa en ny klocka, behöver byta ett batteri eller är i behov av en mer omfattande klockrenovering.&nbsp;</p>\n\n<p><br></p>\n\n<p><strong>Vänligen notera:</strong>&nbsp;Man tjänar endast poäng vid köp online och inte i fysiska butiker.<br></p>", "status": "active", "category_slug": "mode-och-accessoarer", "category_name": "Mode och accessoarer", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-7ec0-700c-a845-e5d23790c75c", "name": "Greenely", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/1EhuRSpgwmv1sXKwoFqBTvVydRpTF3EL81DW4o9F.png", "description": "<div>Glöm allt du vet om elavtal. Greenely har lanserat framtidens elavtal som optimerar din elanvändning med data och intelligens. Över 200 000 människor i Sverige använder Greenely för att sänka sina elkostnader och bidrar till en hållbar planet.</div><div><br><strong>***Kampanjen gäller endast om du bor i villa/hus***. Om du bokar for lägenhet kommer dina poäng att justeras till 3 000.</strong></div><div><br></div><div><strong>Vänligen notera:</strong> För att poäng ska falla ut så får man inte byta elbolag inom loppet av en 3 månaders period, räknat från startdatum. Man har 14 dagars ångerrätt, men om man utnyttjar det så faller ingen poäng ut.<br><br>Vanligvis kan du inte tjäna poäng när du använder en rabattkod, men detta är dock inte fallet med denna kampanj. Den här kampanjen kan bara användas en gång per Eurobonus-medlem. Kampanjen gäller endast svenska EuroBonus-medlemmar.</div>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 5000, "bonus": 0, "level": 1000, "unit_variable": false, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-89bd-7203-a3f0-9226d1c65f54", "name": "Netlingeri", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Netlingeri.se-1689584110.jpg", "description": "<p>Netlingeri.se har sedan 2006 sålt underkläder till kvinnor online från märken som Prima Donna, Triumph, Chantelle, Marie Jo, Femilet, Sloggi och andra märken. Vi erbjuder 10% rabatt på första beställningen och har ett stort urval av behåar, trosor och badkläder.</p>", "status": "active", "category_slug": "mode-och-accessoarer", "category_name": "Mode och accessoarer", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-8c89-7109-bea2-5145da18fd5e", "name": "Dplay", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Dplay.se-1689584110.jpg", "description": "<p>Välkommen til Dplay - Discovery Networks Swedens streamingtjänst. Discovery Networks Sweden är ett TV-hus med ett brett sprektrum av kanaler, spännande program och färgstarke och populära profiler. Här samlar vi det bästa innehållet från några av Sveriges - och världens - största tv-kanaler, bland annat Kanal 5, Kanal 11, TLC, Discovery Channel och Eurosport. Det betyder innehåll i världsklass, allt ifrån hisnande underhållning till gripande dokumentärer.&nbsp;</p><p><br></p><p>Välj själv om du vill titta gratis eller skaffa ett Premium-konto där du kan titta på alla våra kanaler utan reklam och dessutom se serier som är helt exklusiva för Dplay. Självklart utan bindningstid.</p><p><br></p><p><br></p><p><strong>Vänligen notera:</strong>&nbsp;Du&nbsp;tjänar&nbsp;endast&nbsp;poäng om&nbsp;du är ny&nbsp;kund och endast för ditt första köp.<br></p>", "status": "active", "category_slug": "bocker-film-och-musik", "category_name": "Böcker, film och musik", "main": 250, "bonus": 0, "level": 50, "unit_variable": false, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-a7ca-7334-bcb3-728962dfbd72", "name": "Markslöjd", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Markslöjd-1689584117.jpg", "description": "<p>Det är inte alltid lätt att sätta fingret på det, men detaljerna är det som gör ett hem lite trevligare, mysigare eller ännu bekvämare. Det är de som skapar en unik atmosfär.</p>\n\n<p><br>På Markslöjd har vi specialiserat oss på dessa detaljer och blivit experter på att förstå samspelet mellan ljus, design och det sammanhang där produkterna ska användas. Hitta rätt lampa för rätt plats och framför allt antända magin som gör ett hus till ett hem.</p>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-ab48-71f4-af60-5986b27867d9", "name": "Billiga-tester.se", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Billiga-tester.se-1689584118.jpg", "description": "<p>Billiga Tester erbjuder ett stort urval av olika typer av graviditetstester, ägglossningstester, spermatest och andra produkter. Alltid gratis frakt. Snabb leverans med PostNord, 1-2 arbetsdagar. Personlig kundtjänst. Märken: Babyplan, Clearblue, RFSU.</p>", "status": "active", "category_slug": "barn-och-baby", "category_name": "Barn och baby", "main": 50, "bonus": 0, "level": 10, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-bb9c-7261-bbaa-a6d16c536d3b", "name": "Stålhästen", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Stålhästen-1689584122.jpg", "description": "<p>Stålhästen startade i oktober 2010 med en idé och en önskan om att skapa en klassisk, stilig och hållbar cykel som alla skulle ha råd med. Istället för moderna cyklar, som i mångt och mycket såg likadan ut oavsett fabrikat, var vår förebild istället mormors eller farfars gamla cykel med rena och stiliga linjer.<br><br>Med åren har vi fått lite flera modeller och tillbehör, men grundidén är densamma – stilrena, klassiska och hållbara cyklar som alla har råd med.</p>", "status": "active", "category_slug": "sport-och-fritid", "category_name": "Sport och fritid", "main": 10, "bonus": 0, "level": 2, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-bd89-7053-bb79-aaf56b369a85", "name": "Sportkost.se", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Sportkost.se-1689584123.jpg", "description": "<p>Handla kosttillskott online snabbt, smidigt & enkelt hos Sportkost.se. Vi har ett stort, prisvärt och kvalitativt sortiment av allt inom kosttillskott, hälsokost & näringstillskott. Sportkost är till för dig som vill ha det senaste och bästa inom kosttillskott. Vi har det du söker, oavsett om du vill gå ner i vikt, gå upp i vikt och/eller bygga muskler.</p>", "status": "active", "category_slug": "sport-och-fritid", "category_name": "Sport och fritid", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-c103-719b-bdb3-4b451167c6ea", "name": "Söderströms", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Söderströms-1689584124.jpg", "description": "<p>Söderströms har varit verksamma sedan 1995 men satsningen på webben är ny och i webbutiken saluförs skogs- och trädgårdsmaskiner från kända varumärken.</p>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 10, "bonus": 0, "level": 2, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-c79e-70aa-ad83-dd9f83fe1ad3", "name": "About you", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/About_you-1689584126.jpg", "description": "<p>Låt dig inspireras av våra influencers och modeikoners sofistikerade kläder och hitta den stil som passar dig bäst!&nbsp;Upptäck vårt stora sortiment med mer än 100.000 produkter och över 800 varumärken.&nbsp;Vi erbjuder även god service som snabb leverans, betalning med faktura, gratis leverans och retur samt 60 dagars öppet köp.</p>", "status": "active", "category_slug": "mode-och-accessoarer", "category_name": "Mode och accessoarer", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-ce8d-71a9-ab7e-4335ae4d9c05", "name": "Etanolkamin-Shop", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Etanolkamin-Shop-1689584127.jpg", "description": "<p>På Etanolkamin Shop är vi experter på moderna och miljövänliga kaminer. I över 6 år har vi sålt etanolkaminer, gaskaminer, elkaminer, braskaminer och hybridkaminer via vår hemsida och fysiska butik. Vi har idag försäljning av kaminer i mer än 10 europeiska länder. Vi har dessutom samlat de bästa av märken från kaminproducenter i branschen.</p>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-ddfb-7229-b484-9d9d4e6f6cb8", "name": "SACKit", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/SACKit_SE-1689584131.jpg", "description": "<p>SACKit är unik dansk design. De skapar funktionella livsstilsprodukter tillverkade av högkvalitativa material. En SACKit-produkt är en produkt som du kommer kunna fortsätta njuta av i flera år! SACKit kompromissar aldrig med funktion eller kvalitet i sina designer.</p>", "status": "active", "category_slug": "dator-och-elektronik", "category_name": "Dator och elektronik", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-e136-7385-8d9e-ca552a7f1d50", "name": "Stööks", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Stööks-1689584132.jpg", "description": "<p>Stööks&nbsp;jobbar med ett brett sortiment av skor för hela familjen, från finskor till gummistövlar och allt däremellan. I mars 2020 uppdaterade de sin profil och utökade sortimentet med fritids- och arbetskläder. Stööks kommer under 2020 fortsätta utöka sortimentet med bl.a. personlig skyddsutrustning och fritidsprodukter.</p>", "status": "active", "category_slug": "mode-och-accessoarer", "category_name": "Mode och accessoarer", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-e99a-720f-a7dd-f5f78ef18507", "name": "Ord & Bok", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Ord_&_Bok-1689584134.jpg", "description": "<p>Ord & Bok är bokhandeln med nöjda kunder. Tack vare ett stort utbud utbud av både fysiska- och digitala-böcker, snabba leveranser och konkurrenskraftiga priser.&nbsp;Hos oss på Ord & Bok finns en läsupplevelse för alla. Vi erbjuder allt från skönlitteratur till studentlitteratur. Förutom fysiska böcker finns även e-böcker, ljudböcker och digitala läromedel!&nbsp;Fysiska böcker skickas inom en till två arbetsdagar och digitala produkter skickas direkt via e-post till kund.</p>", "status": "active", "category_slug": "bocker-film-och-musik", "category_name": "Böcker, film och musik", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-f38d-7343-851a-bd249a8232cb", "name": "Bonti", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Bonti-1689584137.jpg", "description": "<p>Bonti har ett brett utbud av barnvagnar, bilbarnstolar, leksaker och allt annat du kan tänkas behöva till ditt barn. Vi erbjuder alltid prisgaranti, fri frakt över 499 kr samt flera olika leveransalternativ för att du ska kunna välja det som passar dig bäst.</p>", "status": "active", "category_slug": "barn-och-baby", "category_name": "Barn och baby", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "0189630f-fd1b-719c-98ab-e0db4f207dc9", "name": "Casall", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Casall-1689584139.jpg", "description": "<p>Casall startade år 1984 med viljan att utveckla det absolut bästa inom träningskläder och hemmaträningsredskap. Sedan start har kvalitet, design, innovation och en hög etisk standard konsekvent varit i fokus och Casall är idag en ledande auktoritet inom träning i Sverige. Casall säljs idag på 20 marknader världen över.</p>", "status": "active", "category_slug": "sport-och-fritid", "category_name": "Sport och fritid", "main": 50, "bonus": 0, "level": 10, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896310-03ee-72a5-8ce0-4d146c8a664b", "name": "Many Pets försäkring", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Many_Pets_försäkring-1689584141.jpg", "description": "<p>ManyPets (tidigare Bought By Many) är den brittiska försäkringsutmanaren som lanserat i Sverige 2019 för att göra djurförsäkring bättre, för alla. Vi erbjuder marknadsledande försäkringar för hund och katt som är utformade utifrån kundernas feedback, önskemål och behov. På så vis har vi skapat en ny typ av djurförsäkring som är bättre anpassad efter dagens hund- och kattägare och deras livsstil.</p>\n\n<p><br></p>\n\n\n\n\n\n\n\n<p><strong>Vänligen notera:</strong>&nbsp;Detta erbjudande kan endast användas en gång per EuroBonus medlem&nbsp;och gäller endast nya kunder.&nbsp;<br></p>", "status": "active", "category_slug": "djurtillbehor", "category_name": "Djurtillbehör", "main": 1000, "bonus": 0, "level": 200, "unit_variable": false, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896310-05a5-71cb-a464-c6428086540d", "name": "Swemed", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Swemed-1689584141.jpg", "description": "<p>Väkommen till Swemed.se. Här är vi experter på inredningsartiklar anpassade för sjukvården. Alla våra produkter är noggrant utvalda från diverse tillverkaren i Europa och uppfyller de hårda krav som ställs på kvalitet och säkerhet idag.</p>", "status": "active", "category_slug": "kontorsmaterial", "category_name": "Kontorsmaterial", "main": 50, "bonus": 0, "level": 10, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896310-13a3-7209-99fa-b9b39702de45", "name": "Hugo Boss", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/M4kf53bJEp6W80DI5tBFLgKJ3U2DARepS8SyhTVO.png", "description": "<div>För HUGO BOSS står kunden i fokus. Tack vare passion, kvalitet och personlighet skapar HUGO BOSS ett märke med högt igenkänningsvärde. BOSS är märket med mångsidighet för en variationsrik vardag. HUGO är märket med en blandning av modernt skrädderi och starka casual-drag för en okonventionell look.</div><div><br></div><div><strong>Vänligen notera:&nbsp;</strong>Inga poäng betalas vid köp via HUGO BOSS-appen</div><div><br></div>", "status": "active", "category_slug": "mode-och-accessoarer", "category_name": "Mode och accessoarer", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896310-1e04-7083-b83b-6a19deed1cf1", "name": "E-Wheels", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/E-Wheels-1689584148.jpg", "description": "<p>E-wheels är ett av nordens största återförsäljare av små elfordon. I tillägg till vår egna produktserie E-wheels och Momas har vi ensamrätt på att sälja Kaabo i hela skandinavien, Zero i Danmark och Norge samt Airwheel, Gotway och Kingsong i Norge. Vårt mål är att erbjuda ett stort utbud av alla typer av elfordon från kvalitativa producenter till lägsta möjliga pris. Med många års erfarenhet inom branschen tar vi nu med oss den stora kompetensen vi upparbetat i Norge in i hela skandinavien.</p>", "status": "active", "category_slug": "dator-och-elektronik", "category_name": "Dator och elektronik", "main": 50, "bonus": 0, "level": 10, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896310-2cab-70bc-9814-751ba5f6cef4", "name": "KidsDreamStore", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/KidsDreamStore-1689584151.jpg", "description": "<p>KidsDreamStore.se är en online butik där du hittar ett stort utbud av barnprodukter för barnfamiljen. Vi är en av Nordens största nätbutik med fokus på licenserade produkter inom Tv-, film- och sagofigurer, exempelvis Frost, Spiderman, Pyjamashjältarna, Greta Gris, Paw Patrol, Star Wars, Cars, Vaiana, Minions, Pokémon.. och många många fler!</p>", "status": "active", "category_slug": "barn-och-baby", "category_name": "Barn och baby", "main": 50, "bonus": 0, "level": 10, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896310-2e87-724b-8e38-231cdf71b372", "name": "BetterFeast", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Better_Feast-1689584152.jpg", "description": "<div>I en hektisk vardag kan det ofta vara svårt att hitta den tid som krävs för att handla och laga mat. BetterFeast är ett bra alternativ för detta. Genom att vara kund hos oss så kan du förlita dig på att vi levererar välsmakade mat - direkt till din ytterdörr. Med BetterFeast blir god orage/app/public/shops/images/Dyson-1689584188.jpg", "description": "<p>Om du inte redan är bekant med Dyson kan vi bara rekommendera att du gör det. Vi är väldigt glada över engelska Dyson, som levererar dammsugare, stylingprodukter och mycket mer. Här får du inte bara en klassisk dammsugare. Istället kan du njuta av innovativ teknik som tar användarupplevelsen till helt nya höjder.</p>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 50, "bonus": 25, "level": 10, "unit_variable": true, "has_campaign": true, "campaign_ends_human": "om 9 timmar", "campaign_ends_human_en": "in 9 hours", "campaign_started": "2026-04-24", "campaign_ends_date": "2026-04-26", "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896310-c0af-71f9-b4de-63838f48708d", "name": "Kungsängen", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Kungsängen-1689584189.jpg", "description": "<p>Din säng har byggts av 14 händer. Sju duktiga sängbyggare med en gemensam strävan: att bygga bättre sängar – tillsammans. Så när du köper en säng av oss på KungSängen, då vet du vad du får. En bästa vän. En säng byggd av oss, med själ och hjärta, där inget lämnats åt slumpen.&nbsp;</p><p><br></p><p><strong>Vänligen notera:</strong>&nbsp;Man tjänar endast poäng vid köp online och inte i fysiska butiker.<br></p>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896310-c5df-7232-a2dc-589b6cddbee7", "name": "Truestory.se", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Truestory.se-1689584191.jpg", "description": "<p>Truestory är en digital upplevelseplattform med inspiration till upplevelser runt o ch-elektronik", "category_name": "Dator och elektronik", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896310-e823-72b0-8d74-6b3da56a30e3", "name": "Autodoc", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Autodoc-1689584200.jpg", "description": "<div>I över 10 år har vi hjälpt kunder i 26 Europeiskaländer att reparera bilar, samt hjälpt kunder med lite erfarenhet. Därför säljer vi endast högkvalitativa bildelar från bara de bästa bildelstillverkarna och till de allra bästa priserna.<br><br><strong>Vänligen notera:</strong> Du kan inte tjäna poäng på däck</div>", "status": "active", "category_slug": "transport", "category_name": "Transport", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896310-f77f-72c9-9b07-830ad79ad27f", "name": "Acer", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Acer-1689584204.jpg", "description": "<p>Acer grundades 1976 och är ett hårdvaru-, mjukvaru- och tjänsteföretag dedikerat till forskning, design, marknadsföring, försäljning och support av innovativa produkter som förbättrar människors liv. Acers produktutbud inkluderar datorer, bildskärmar, projektorer och surfplattor.</p>", "status": "active", "category_slug": "dator-och-elektronik", "category_name": "Dator och elektronik", "main": 10, "bonus": 0, "level": 2, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896311-0958-725c-b6df-4d2efeaf54c9", "name": "Sif Jakobs", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Sif_Jakobs-1689584208.jpg", "description": "<div>Sif Jakobs Jewellery är känt för iögonfallande och eleganta smyckeskreationer, ofta med en cool nordisk touch. Designen ser glamorös ut och är fortfarande \"prisvärd\". Smyckena är gjorda av 925 sterling silver, delvis pläterade med 18K guld eller 18K rosa guld. Högkvalitativa handgjorda, cubic zirconia stenar ger smyckena en glamorös look.</div>", "status": "active", "category_slug": "mode-och-accessoarer", "category_name": "Mode och accessoarer", "main": 50, "bonus": 0, "level": 10, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896311-3b0c-733b-898b-c6563e0538bc", "name": "AEG", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/qEVmNvrJbd5vwEkj5BStpBr8JP92DJxbvNHt0AEM.jpg", "description": "<div>Vi trivs med innovationer som ger dig den ultimata upplevelsen av att bemästra din matlagning och klädvård. Vi ser dina behov idag – och förutser dem imorgon – så att du kan uppnå resultat som inte bara motsvarar dina förväntningar, utan överträffar dem. Vi är AEG. Och tillsammans med dig ligger vi alltid ett steg före.</div>", "status": "active", "category_slug": "dator-och-elektronik", "category_name": "Dator och elektronik", "main": 10, "bonus": 0, "level": 2, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896311-41e5-71ce-a786-88cf89a16243", "name": "Electrolux Spares & accessories", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Electrolux_Spares_&_accessories-1689584223.jpg", "description": "<p>Grundat i Sverige 1919 där vi tror att erfarenheterna formas efter vårt sätt att leva. Med roten i våra svenska värderingar och ett hållbart förhållande till naturen, designar vi med ett tydligt syfte. Det här gäller allt vi gör. Från att ta hand om dina kläder så att de ser nya ut och varar längre, eller utformningen av nya kök som fokuserar på smakens glädje till att förbättra välbefinnandet i ditt hem.</p>", "status": "active", "category_slug": "dator-och-elektronik", "category_name": "Dator och elektronik", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896311-5664-7143-9c4f-2a783c0f8b17", "name": "Racketspecialisten", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Racketspecialisten-1689584228.jpg", "description": "<p>Racketspecialisten är nordens störta racketbutik och erbjuder er som utövar racketsport ett noga utvalt sortiment från världens ledande varumärken till mycket konkurrenskraftiga priser. Vår ambition är att erbjuda ett enkelt sätt för dig att handla så att du kan ägna din tid åt att utöva din sport.</p>", "status": "active", "category_slug": "sport-och-fritid", "category_name": "Sport och fritid", "main": 10, "bonus": 0, "level": 2, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896311-5e91-70a4-97d5-33ea788e232e", "name": "PatPat", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/PatPat-1689584230.jpg", "description": "<p>PatPat gör det enkelt och roligt att utrusta dina barn! Vår formel är enkel:</p>\n\n<p>PatPat: Söt + kvalitet + bra pris = fler lyckliga stunder.</p>\n\n\n\n<p>Oavsett om det är första dagen i skolan, en lekträff, en dag hemma eller en semesterstund. PatPat kommer att hålla dig och hela familjen leende. Helt enkelt, vi erbjuder ett stort sortiment av söta, kvalitetskläder till bra priser så att familjer runt om i världen kan ha fler glada stunder.</p>", "status": "active", "category_slug": "barn-och-baby", "category_name": "Barn och baby", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896311-695c-72e8-8d78-f254e085e3dd", "name": "KitchenAid", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/KitchenAid-1689584233.jpg", "description": "<p>KitchenAids hemsida erbjuder små hushållsapparater av hög kvalitet. Från den ikoniska Artisan köksmaskinen till de kraftfulla blandarna, för att inte tala om vattenkokare och kaffemaskiner – det stora produktsortimentet gör det möjligt för alla att bli en riktig kock i köket. Behöver du idéer till recept? Kitchenaid.dk är också en riktig inspirationskälla. Varje besökare kan hitta massor av recept som enkelt kan filtreras efter deras önskemål eller den enhet de vill använda.</p>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896311-6dc5-71e3-913b-755e3e93a3f2", "name": "Puma", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Puma-1689584234.jpg", "description": "<p>Puma är ett av världens största sportmärken. De designar och utvecklar skor, kläder och accessoarer för daglig användning och många olika sp 2a1", "name": "Nordiska Galleriet", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/1LXrwPkEWqJUMLJPqRsghG6tPVkKLuf2MBZrOPYI.jpg", "description": "<div>Nordiska Galleriet öppnade sin första butik på Nybrogatan 11 i Stockholm redan 1912 och blev tidigt en självklar destination för exklusiva möbler och modern design. Vi har samlat det bästa i vår e-handel för att du ska kunna uttrycka din designidentitet fullt ut. Varenda möbel och detalj du ser är handplockad från våra hundratals välkända leverantörer och designers världen över.<br><br><strong>Vänligen notera:</strong> Du tjänar bara poäng när du beställer och betalar online.</div>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896311-859b-70f9-876a-a52c61ec5e5a", "name": "Lenovo", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Lenovo-1689584240.jpg", "description": "<p>Hos Lenovo kan du köpa de bästa bärbara datorerna, bärbara datorerna, ultrabooks, PC:erna och servrarna för både hemmet och företaget. Datortillbehör och uppgraderingar finns också här!</p>", "status": "active", "category_slug": "dator-och-elektronik", "category_name": "Dator och elektronik", "main": 30, "bonus": 20, "level": 6, "unit_variable": true, "has_campaign": true, "campaign_ends_human": "om 9 timmar", "campaign_ends_human_en": "in 9 hours", "campaign_started": "2026-04-24", "campaign_ends_date": "2026-04-26", "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896311-99a6-70fd-bfce-0a84db085353", "name": "Asus", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Asus-1689584245.jpg", "description": "<div>ASUS brinner för teknik och drivs av innovation. Vi drömmer, vi vågar och vi strävar efter att skapa ett enkelt och glädjefyllt digitalt liv för alla. Vi letar alltid efter unika idéer och upplevelser, och vi strävar efter att leverera det otroliga i allt vi gör.</div><div><br></div><div><strong>Vänligen notera: </strong>Du tjänar bara poäng på datorer och telefoner, inte tillbehör.</div>", "status": "active", "category_slug": "dator-och-elektronik", "category_name": "Dator och elektronik", "main": 10, "bonus": 0, "level": 2, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896311-a9a9-7126-a141-8d21d5eda6dc", "name": "GLAS Scandinavia", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/GLAS_Scandinavia_AB-1689584249.jpg", "description": "<p>GLAS erbjuder snygga läsglasögon av hög kvalitet med modern, skandinavisk design - vardagslyx för den moderna kvinnan som värdesätter kvalitet.</p>", "status": "active", "category_slug": "mode-och-accessoarer", "category_name": "Mode och accessoarer", "main": 10, "bonus": 0, "level": 2, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896311-ab65-7388-a565-3d9e09a3fd2e", "name": "Organic Basics", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Organic_Basics-1689584250.jpg", "description": "<p>Modebranschen är en smutsig jävel. Så vi sätter hållbart tänkande i centrum för allt - det betyder att vi bara väljer tyger som tar hand om vår miljö och att vi alltid samarbetar med fabriker som också bryr sig om deras påverkan.</p>\n\n<p>När vi säger att hållbarhet är vårt kärnuppdrag menar vi inte att hållbarhet är trevligt att ha - vi menar att d gone_since": null}, {"uuid": "01896311-bc95-710e-bb1d-ebccfe64d8c2", "name": "Lusini", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Lusini-1689584254.jpg", "description": "<p>Vårt bolag går under namnet LUSINI och är skapat för att inspirera, ge en personlig service och förse Europa med produkter av bästa kvalitet. Allt på ett ställe! Med LUSINI har vi byggt ett hem för våra kända varumärken VEGA, JOBELINE och ERWIN M., som har tjänat restaurangbranschen i över trettio år. VEGA är specialister på möbler till matsal och uteservering, det dukade bordet och allt som behövs i köket. I snygg design med hög funktionalitet. ERWIN M., vårt textilsortiment, är nytt på den skandinaviska marknaden. I Europa har Erwin M. funnits i över 30 år. Vi har allt som behövs för servering, kök och övernattning! JOBELINE erbjuder funktionellt mode för hotell- och restaurangyrken. Utmärkt kvalitet och profilerbara kläder är en självklarhet! Vårt mål är att våra kunder ska kunna skapa oförglömliga gästupplevelser. Vi på LUSINI vill erbjuda de företag som jobbar med service varje dag, den service de behöver!</p>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896311-c762-72e7-8110-9489cd35dfb2", "name": "Agood Company", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/3h5jCYpYjXKadOMWuLA6JXVn4cewqad81nQxr4as.png", "description": "<div>Agood Company är ett svenskt livsstilsvarumärke, som tagit hållbarhet till nästa nivå. Vi existerar för att skapa snygga, 100% hållbara produkter som du använder i vardagen. Agood Company erbjuder allt ifrån mobilskal helt fria från plast och tillverkade utav resterna från linfröplantan, ante 66.jpg", "description": "<p>Gör det enkelt att köpa allt för din arbetsplats både på jobbet och hemma! Lyreco är den ledande leverantören av arbetsplatsprodukter, tjänster och lösningar för små, medelstora och stora företag i Europa. Tack vare vårt breda utbud och lösningar är Lyreco det självklara valet för att tillgodose behoven för alla former av arbetsplatser.</p>", "status": "active", "category_slug": "kontorsmaterial", "category_name": "Kontorsmaterial", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896311-ed1e-72a2-b624-0b81184ec29e", "name": "Vy Bus4you", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Vy_Bus4you-1689584266.jpg", "description": "<p>Vy Bus4you är Nordens näst största bussbolag, med verksamhet i Norge och Sverige.</p>\n\n<p><br></p><p>Vy Bus4you erbjuder sina kunder bussresor med högsta komfort. I stora och sköna skinnfotöljer, med WiFi (4G) och eluttag vid varje säte så att du som resenär kan arbeta, surfa eller bara koppla av. Vy Bus4you har persontransportens nöjdaste kunder, och har haft det under de senaste åtta åren enligt mätningar gjorda av SKI, kvalitetsindex.se.&nbsp;</p>\n\n\n\n<p><br></p><p>Vy Bus4you express erbjuder smidiga resor för den som vill resa riktigt billigt. Att resa med Vy Bus4you är alltid trevligt, pålitligt, trafiksäkert, miljövänligt och snällt mot plånboken!</p>", "status": "active", "category_slug": "transport", "category_name": "Transport", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896311-f503-7384-aee3-9a3ad6d6af0d", "name": "Zwilling", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Zwilling-1689584269.jpg", "description": "<p>ZWILLING har, sedan 1731, tillverkat innovativa köksprodukter av högsta kvalitet. I vårt sortiment på zwilling.com/se hittar du allt från knivar till glas, köksredskap, stekpannor, grytor, elektriska köksmaskiner och smarta vakuumprodukter.</p>\n\n<p>År 2020 lanserade vi två nya serier: ZWILLING ENFINIGY (elektriska köksmaskiner som bland annat brödrostar, blenders och kaffebryggare) samt ZWILLING FRESH & SAVE (ett innovativt vakuumsystem).</p>\n\n\n\n<p>Med ZWILLING FRESH & SAVE har vi utvecklat en vakuumserie som kan minska matsvinnet, samt passar utmärkt för matlagning. I serien ingår en trådlös vakuumpump, återanvändbara påsar och lådor i olika utföranden. Men framförallt så håller serien maten fräsch upp till 5 gånger längre jämfört med förvaring utan vakuum – så att ingen mat ska gå till spillo.</p>\n\n\n\n<p>ZWILLING gör den moderna vardagen och matlagningen enklare och roligare.</p>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896311-fdf4-7247-b1bb-5c8c3a02ff39", "name": "Prylife", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Prylife-1689584271.jpg", "description": "<p>På Prylify.se kan du fynda bland 1500 smarta och billiga prylar inom olika kategorier som teknik- och mobilprylar, skönhetsprodukter, roliga prylar och prylar för hem och hobby för att nämna några exempel. Vi erbjuder alltid våra kunder gratis frakt och har idag över 90 000 nöjda kunder.</p>", "status": "active", "category_slug": "dator-och-elektronik", "category_name": "Dator och elektronik", "main": 50, "bonus": 0, "level": 10, "unit_variable" gnmöbler när de är som bäst! Här på Glashuset hittar du designmöbler som passar just dina behov. Vi är stolta över att kunna erbjuda designmöbler för hemmets alla rum; från vardagsrum, hall och kök till sovrum eller kontor. Vare sig du letar efter en soffa, en matgrupp, en förvaringslösning, inredningsdetaljer eller utomhusmöbler för att göra ditt hem bekvämare kan du hitta det hos oss.</div>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896312-5ad6-728c-816e-b50fd3b1f767", "name": "Länna Möbler", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Länna_Möbler-1689584294.jpg", "description": "<p>Länna öppnade butiken i Stockholm 1973. 2022 expanderar vi internationellt genom att lansera vår e-handel i Norge och Finland. Som leverantör av klassisk och tidlös liksom modern och progressiv design har Länna sedan länge gått i bräschen för att leverera skandinaviska designmöbler av en rad erkända formgivare, från ikoner som Alvar Aalto och Arne Jacobsen till en helt ny generation skandinavisk designtalang. Avskalat och nytänkande, funktionellt och kvalitativt. Formgivning som i utförande och form definierar själva briljansen i skandinavisk möbeldesign</p>", "status": "active", "category_slug": "hus-och-hem", "category_name": "Hus och hem", "main": 50, "bonus": 25, "level": 10, "unit_variable": true, "has_campaign": true, "campaign_ends_human": "om 4 dagar", "campaign_ends_human_en": "in 4 days", "campaign_started": "2026-04-24", "campaign_ends_date": "2026-04-30", "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896312-5fea-70f5-a8eb-a65be3342068", "name": "MEDS", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/MEDS.se-1689584296.jpg", "description": "<div>MEDS är Sveriges mobilapotek med licens från Läkemedelsverket. MEDS erbjuder receptbelagda läkemedel samt ett stort utbud av av hälso och skönhetsprodukter. Vi levererar snabbt hem eller dit du befinner dig, ibland inom en timme. MEDS tycker att det är sjukt att behöva gå till ett fysiskt apotek när du mår dåligt. MEDS farmaceuter erbjuder kvalificerad rådgivning via telefon, email och chat.</div><div><br><strong>Vänligen notera:</strong> Poäng delas inte ut vid köp av läkemedel eller receptbelagda produkter.</div>", "status": "active", "category_slug": "halsa-och-skonhet", "category_name": "Hälsa och skönhet", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896312-6607-711b-a79c-23479d58722a", "name": "Flygbussarna", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Flygbussarna-1689584297.jpg", "description": "<p>Sedan 1989 har Vy Flygbussarna stolt kört resenärer till och från de stora flygplatserna i Sverige. Vi finns i Stockholm, Göteborg och Malmö och trafikerar totalt 7 flygplatser.&nbsp;&nbsp;</p>\n\n<p>Med Vy flygbussarna reser du prisvärt, punktligt och alltid med fossilfritt i tanken. Vy flygbussarna vill bidra till en mer hållbar värld - både utifrån hur vi tankar våra bussar, till att våra gäster och medarbetare ska känna sig välkomna och behandlas lika.</p>", "status": "active", "category_slug": "transport", "category_name": "Transport", "main": 10, "bonus": 0, "level": 2, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896312-74de-7107-922e-f1b8c46db91f", "name": "Bazta", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/Bazta-1689584302.jpg", "description": "<p>Bazta.com grundades 2022 med syfte att erbjuda konsumenten en fantastisk shoppingupplevelse genom ett stort utbud av märkesvaror till förmånliga priser och med en toppservice. Därmed är vårt mål och uppdrag att kunna erbjuda allt som du som kund kan drömma om – om än med vissa begränsningar. Men tvärtom, så snabbt vi kan och igen och inte minst till så förmånliga priser som möjligt! Och hur ska vi göra detta kan man fråga sig. Det finns ett tydligt svar på det, nämligen att vi som professionella och mycket engagerade handlare tar fram och prisförhandlar åt dig med liv och själ.</p>", "status": "active", "category_slug": "dator-och-elektronik", "category_name": "Dator och elektronik", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896312-8569-725c-bfe6-5efbd5b1b2df", "name": "Ishavet", "logo": "https://storage.onlineshopping.loyaltykey.com/storage/app/public/shops/images/vaNe8dCnXpnm0CtE6lpQpamdXXRpEGp6hzJEyzDq.png", "description": "<div>Vi tror att den bästa fisken är den du fångar själv, men när det inte är ett alternativ levererar ishavet till 80% av Sverige. Vi levererar den bästa, fantastiskt färska, hälsosamma maten från havet. Vi är stolta över att hämta våra skaldjur från hållbara produktioner och levererar vår fisk direkt till din dörr i lättanvända portionsförpackningar.</div>", "status": "active", "category_slug": "mat-och-dryck", "category_name": "Mat och dryck", "main": 25, "bonus": 0, "level": 5, "unit_variable": true, "has_campaign": false, "campaign_ends_human": null, "campaign_ends_human_en": null, "campaign_started": null, "campaign_ends_date": null, "first_seen": "2026-04-24", "gone_since": null}, {"uuid": "01896312-8
